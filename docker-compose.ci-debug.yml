# Local CI Debug Environment
# 模拟GitHub Actions的执行环境，用于本地调试

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ci-postgres
    environment:
      POSTGRES_DB: football_prediction_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5433:5432"  # 使用5433端口避免冲突
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ci-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d football_prediction_test"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    command: >
      postgres
      -c max_connections=200
      -c shared_preload_libraries=uuid-ossp
      -c log_statement=all
      -c log_destination=stderr
      -c log_min_messages=info

  redis:
    image: redis:7-alpine
    container_name: ci-redis
    ports:
      - "6380:6379"  # 使用6380端口避免冲突
    networks:
      - ci-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ci-runner:
    image: python:3.11-slim
    container_name: ci-runner
    working_dir: /app
    volumes:
      - .:/app  # 挂载当前项目目录
      - /app/venv  # 创建虚拟环境缓存目录
    environment:
      # 模拟GitHub Actions环境变量
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: football_prediction_test
      DB_USER: test_user
      DB_PASSWORD: test_password
      DATABASE_URL: postgresql+psycopg2://test_user:test_password@postgres:5432/football_prediction_test
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      MOCK_DATABASE: "false"
      MOCK_REDIS: "false"
      ENVIRONMENT: ci
      PYTHONPATH: /app/src
      TZ: UTC
    networks:
      - ci-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 保持容器运行，避免自动退出
    command: tail -f /dev/null
    # 启用交互式终端支持
    stdin_open: true
    tty: true

volumes:
  postgres_data:
    driver: local

networks:
  ci-network:
    driver: bridge