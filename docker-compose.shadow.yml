version: '3.8'

services:
  app:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    env_file:
      - .env.shadow
    environment:
      # 影子实战测试配置
      - ENVIRONMENT=shadow_test
      - TZ=UTC
      - PYTHONPATH=/app/src

      # 数据库配置
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=football_prediction_shadow
      - DB_USER=football_user
      - DB_PASSWORD=${DB_PASSWORD:-football_pass}

      # Redis配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=1

      # 影子测试特定配置
      - SHADOW_MODE=true
      - INFERENCE_SERVICE_V2_ENABLED=true
      - COLLECTION_SERVICE_ENABLED=true
      - EXPLAINABILITY_SERVICE_ENABLED=true

      # 模型配置
      - MODEL_PATH=/app/data/models
      - DEFAULT_MODEL_NAME=xgboost_v2

      # 性能监控
      - ENABLE_METRICS=true
      - METRICS_PORT=9090
      - ENABLE_TRACING=true

      # API配置
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_DEBUG=false

    command: ["python", "/app/scripts/shadow_daemon.py"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped

    # 健康检查
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=football_prediction_shadow
      - POSTGRES_USER=football_user
      - POSTGRES_PASSWORD=${DB_PASSWORD:-football_pass}
      - TZ=UTC
    ports:
      - "5433:5432"
    volumes:
      - shadow_db_data:/var/lib/postgresql/data
      - ./scripts/init_shadow_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football_user -d football_prediction_shadow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - shadow_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.shadow.yml:/etc/prometheus/prometheus.yml:ro
      - shadow_prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=48h'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - shadow_grafana_data:/var/lib/grafana
      - ./monitoring/grafana/shadow-dashboard.json:/etc/grafana/provisioning/dashboards/shadow-dashboard.json:ro
    restart: unless-stopped

volumes:
  shadow_db_data:
  shadow_redis_data:
  shadow_prometheus_data:
  shadow_grafana_data: