# ==============================================
# 足球预测系统试运营环境配置 - 优化版
# Infrastructure Audit & Optimized Configuration
# 针对本地7.8GB内存/50GB数据的性能调优
# ==============================================

services:
  # ==============================================
  # 核心应用服务 - 资源优化
  # ==============================================
  app:
    build:
      context: .
      target: runtime
    container_name: football-prediction-app
    ports:
      - "8000:8000"
    env_file:
      - .env.trial
    environment:
      # 数据库连接配置
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=football_prediction_prod
      - DB_USER=football_user
      - DB_PASSWORD=postgres_prod_2024_secure
      - REDIS_URL=redis://redis:6379/0

      # 代理配置 - WSL2网络穿透
      - HTTP_PROXY=http://host.docker.internal:7890
      - HTTPS_PROXY=http://host.docker.internal:7890
      - NO_PROXY=localhost,127.0.0.1,172.20.0.1/16,db,redis,prometheus,grafana

      # 性能优化配置
      - DATABASE_POOL_SIZE=10
      - DATABASE_MAX_OVERFLOW=20
      - REDIS_CONNECTION_POOL_SIZE=30
      - MODEL_CACHE_TTL=3600

      # 内存监控
      - MEMORY_MONITOR_ENABLED=true
      - MEMORY_THRESHOLD_MB=1536

    entrypoint: []
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--log-level", "info", "--workers", "1"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
      - ./logs:/app/logs
      - ./data:/app/data
      - model_data:/app/data/models:cached  # 使用cached模式优化IO
      - trial_logs:/app/logs/trial
    networks:
      - trial-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'          # 增加CPU限制
          memory: 1.5G         # 适配7.8GB宿主机
        reservations:
          cpus: '1.0'
          memory: 768M         # 保证最小内存
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ==============================================
  # PostgreSQL 数据库 - 内存调优
  # ==============================================
  db:
    image: postgres:15
    container_name: football-prediction-db
    environment:
      - POSTGRES_DB=football_prediction_prod
      - POSTGRES_USER=football_user
      - POSTGRES_PASSWORD=postgres_prod_2024_secure
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C

      # PostgreSQL内存优化 - 针对本地1.5GB容器限制
      - POSTGRES_SHARED_BUFFERS=256MB          # 1/4容器内存
      - POSTGRES_EFFECTIVE_CACHE_SIZE=768MB   # 1/2容器内存
      - POSTGRES_WORK_MEM=8MB                 # 增加排序内存
      - POSTGRES_MAINTENANCE_WORK_MEM=64MB     # 维护操作内存
      - POSTGRES_CHECKPOINT_COMPLETION_TARGET=0.7
      - POSTGRES_WAL_BUFFERS=8MB
      - POSTGRES_DEFAULT_STATISTICS_TARGET=100
      - POSTGRES_RANDOM_PAGE_COST=1.1         # SSD优化
      - POSTGRES_EFFECTIVE_IO_CONCURRENCY=200 # SSD并发优化

      # 连接优化
      - POSTGRES_MAX_CONNECTIONS=50
      - POSTGRES_SUPERUSER_RESERVED_CONNECTIONS=3

    volumes:
      - postgres_trial_data:/var/lib/postgresql/data:cached  # cached模式优化
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.7
      -c wal_buffers=8MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_connections=50
      -c superuser_reserved_connections=3
      -c logging_collector=on
      -c log_directory=log
      -c log_filename=postgresql-%Y-%m-%d.log
      -c log_statement=mod
      -c log_min_duration_statement=1000
    networks:
      - trial-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.5'          # 增加CPU用于复杂查询
          memory: 1.5G         # 增加内存支持大数据查询
        reservations:
          cpus: '0.75'
          memory: 768M
    expose:
      - "5432"

  # ==============================================
  # Redis 缓存服务 - 内存优化
  # ==============================================
  redis:
    image: redis:7-alpine
    container_name: football-prediction-redis
    volumes:
      - redis_trial_data:/data:cached  # cached模式优化
    command: >
      redis-server
      --appendonly yes
      --maxmemory 384mb               # 适配容器内存限制
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-keepalive 300
      --timeout 0
    networks:
      - trial-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M              # 增加缓存内存
        reservations:
          cpus: '0.25'
          memory: 256M
    expose:
      - "6379"

  # ==============================================
  # 监控栈 - 轻量化配置
  # ==============================================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: football-prediction-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_trial_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'        # 缩短保留时间
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--query.timeout=5m'
    networks:
      - trial-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M               # 减少监控内存占用
        reservations:
          cpus: '0.25'
          memory: 256M

  grafana:
    image: grafana/grafana:10.1.0
    container_name: football-prediction-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_trial_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123_change_me
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=redis-datasource
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_METRICS_ENABLED=false          # 关闭自身指标节省内存
    networks:
      - trial-network
    restart: unless-stopped
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M               # 减少Grafana内存
        reservations:
          cpus: '0.25'
          memory: 128M

  # ==============================================
  # 监控导出器 - 轻量化
  # ==============================================
  redis-exporter:
    image: oliver006/redis_exporter:v1.45.0
    container_name: football-prediction-redis-exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      - redis
    networks:
      - trial-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

  node-exporter:
    image: prom/node-exporter:v1.6.0
    container_name: football-prediction-node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--no-collector.infiniband'
      - '--no-collector.ipvs'
    networks:
      - trial-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

# ==============================================
# 卷配置 - 优化IO性能
# ==============================================
volumes:
  postgres_trial_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/postgres
  redis_trial_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/redis
  model_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/models
  trial_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/logs/trial
  prometheus_trial_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/prometheus
  grafana_trial_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/grafana

# ==============================================
# 网络配置 - 优化WSL2性能
# ==============================================
networks:
  trial-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
    driver_opts:
      com.docker.network.bridge.name: football-trial-br0
      com.docker.network.driver.mtu: 1500