# Alembic 配置文件 - V105.0
# ================================
# 用于管理 PostgreSQL 数据库 schema 演进

[alembic]
# 迁移脚本目录
script_location = .

# 迁移版本存储表名称（默认: alembic_version）
version_table = alembic_version
# 版本表 schema（默认: None）
# version_table_schema = schema

# 版本路径分隔符（默认: os.pathsep）
version_path_separator = os  # Use 'os' for path.sep, ';' for Windows, ':' for Unix

# 输出编码
output_encoding = utf-8

# 数据库连接 URL - 从环境变量读取
# sqlalchemy.url = postgresql://user:pass@localhost/dbname
sqlalchemy.url = postgresql://football_user:football_pass@localhost/football_prediction_dev

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
