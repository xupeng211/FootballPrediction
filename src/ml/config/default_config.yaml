# Football Prediction ML Configuration
# Phase 2: AI Modeling - Enterprise ML Architecture

# 模型配置
model_type: "xgboost"
random_state: 42
n_jobs: -1

# 训练参数
test_size: 0.2
cv_folds: 5
early_stopping_rounds: 50

# 特征工程
feature_types:
  - "advanced"
max_features: 100
feature_selection_threshold: 0.01

# XGBoost 超参数
xgboost_params:
  max_depth: 6
  learning_rate: 0.1
  n_estimators: 100
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0
  reg_lambda: 1
  objective: "binary:logistic"
  eval_metric: "logloss"

# 数据路径
data_path: "data/"
model_path: "models/"
mlflow_tracking_uri: "http://localhost:5000"
experiment_name: "football-prediction"

# 质量控制
min_train_samples: 100
max_train_samples: null
validation_split_random_state: 123

# 部署配置
model_version: "1.0.0"
production_threshold: 0.7