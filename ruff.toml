# Ruff 配置文件 - V106.0
# ================================
# 极速 Python 代码扫描器和格式化器

target-version = "py311"
line-length = 100

[lint]
# 启用的规则集
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "DTZ",    # flake8-datetimez
    "T10",    # flake8-debugger
    "EM",     # flake8-errmsg
    "ISC",    # flake8-implicit-str-concat
    "ICN",    # flake8-import-conventions
    "G",      # flake8-logging-format
    "PIE",    # flake8-pie
    "T20",    # flake8-print
    "PT",     # flake8-pytest-style
    "Q",      # flake8-quotes
    "RSE",    # flake8-raise
    "RET",    # flake8-return
    "SIM",    # flake8-simplify
    "TID",    # flake8-tidy-imports
    "TCH",    # flake8-type-checking
    "ARG",    # flake8-unused-arguments
    "PTH",    # flake8-use-pathlib
    "ERA",    # eradicate
    "PL",     # Pylint
    "TRY",    # tryceratops
    "FLY",    # flynt
    "PERF",   # Perflint
    "RUF",    # Ruff-specific rules
]
extend-select = ["PLR0915", "C901", "D101", "D102", "D103"]  # 显式阻断过长函数、复杂度和公开 API 无文档

# 忽略的规则
ignore = [
    "E501",   # line too long (handled by formatter)
    "PLR0913", # too many arguments
    "TRY003", # avoid specifying long messages outside exception class
    "EM101",  # raw string in exception
    "EM102",  # f-string in exception
    "S101",   # use of assert detected
    "ANN",    # type annotations (handled by mypy)
    "RUF001", # Chinese string punctuation (中文字符串合法)
    "RUF002", # ambiguous Chinese characters (中文文档字符串合法)
    "RUF003", # Chinese comment punctuation (中文注释合法)
]

# 允许自动修复
fixable = ["ALL"]
unfixable = []

[lint.per-file-ignores]
"tests/*" = ["S101"]  # 允许测试中使用 assert
"scripts/*" = ["T20"]  # 允许脚本中使用 print
"tests/**/*.py" = ["S101", "D101", "D102", "D103"]
"tests/*.py" = ["S101", "D101", "D102", "D103"]
"__init__.py" = ["F401"]  # 允许未使用的导入

[lint.isort]
known-first-party = ["src", "tests"]
force-sort-within-sections = true
split-on-trailing-comma = false

[lint.pycodestyle]
max-doc-length = 100

[lint.pydocstyle]
convention = "google"

[lint.pep8-naming]
# Allow common naming patterns
classmethod-decorators = ["classmethod"]

[lint.pylint]
max-statements = 50

[lint.mccabe]
max-complexity = 10

[format]
# 使用双引号
quote-style = "double"

# 缩进风格
indent-style = "space"

# 保留魔法逗号
skip-magic-trailing-comma = false

# 行尾风格
line-ending = "auto"

# 文档字符串代码块格式化
docstring-code-format = true
docstring-code-line-length = 100
