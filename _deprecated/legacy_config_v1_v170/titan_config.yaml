# V41.212: UI 动态扩展配置
ui_expansion:
  # 扩展触发关键词（用于扫描可交互按钮）
  expansion_keywords:
    - "Show"
    - "View"
    - "More"
    - "Expand"
    - "Details"
    - "See"
    - "Open"
    - "Load"
    - "Display"
    - "+"
    - "▼"
    - "▶"

  # 标签检索序列（多轮感知检索）
  labels:
    - "Pinnacle"
    - "Bet365"
    - "Opening"
    - "Closing"
    - "Movement"
    - "Odds"

  # 扩展等待配置
  expansion_wait_ms: 1500
  network_idle_timeout: 10000
  max_expansion_depth: 3

# =============================================================================
# V41.236: Odds Sync Configuration (赔率数据同步系统)
# =============================================================================
odds_sync:
  # 核心采集器配置
  auditor:
    # 浏览器配置
    headless: true
    network_idle_timeout: 30000
    navigation_timeout: 90000  # V41.231: 90s 超时
    max_retries: 3  # V41.231: 最大重试次数
    wait_after_load: 5000  # V41.231: 加载后硬性等待 (ms)
    wait_strategy: domcontentloaded  # V41.231: domcontentloaded/domloaded/networkidle

    # 滚动配置
    scroll_iterations: 5
    scroll_delay_ms: 800

    # 数值阈值
    min_value_threshold: 1.01
    max_value_threshold: 50.00
    enable_degraded_mode: true
    container_width_ratio: 0.3

    # 目标模式（用于定位赔率数据）
    target_patterns:
      - "Opening"
      - "Closing"
      - "Movement"

    # Cookie 同意配置
    consent_cookie_name: consent
    consent_cookie_value: accepted

  # 数据对齐器配置
  linker:
    time_window_hours: 48.0  # 时间窗口（小时）
    similarity_threshold: 0.75  # V41.232: 相似度阈值（0.85 → 0.75）
    max_candidates: 10  # 最大候选数
    enable_fuzzy_match: true  # 启用模糊匹配
    enable_abbreviation_expansion: true  # V41.232: 启用缩写扩展

    # 数据库表配置
    matches_table: matches
    odds_table: match_odds_intelligence

  # 输出配置
  output:
    log_dir: logs
    result_file: industrial_audit_result.json
    screenshot_on_failure: true  # V41.232: 失效时自动截图

