# Redis 生产环境配置
bind 0.0.0.0
port 6379
timeout 0
tcp-keepalive 300

# 内存配置
maxmemory 512mb
maxmemory-policy allkeys-lru

# 持久化配置
save 900 1
save 300 10
save 60 10000

# AOF 持久化
appendonly yes
appendfsync everysec

# 日志配置
loglevel notice
logfile ""

# 安全配置
protected-mode yes

# 客户端连接配置
maxclients 10000

# 网络配置
tcp-backlog 511