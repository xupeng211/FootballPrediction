# Telegraf configuration for Celery monitoring
[agent]
  interval = "15s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "15s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false

# ================================
# Celery Monitoring via Redis
# ================================
[[inputs.redis]]
  servers = ["tcp://redis:6379"]
  fieldpass = ["connected_clients", "used_memory", "used_memory_peak", "keyspace_hits", "keyspace_misses", "expired_keys", "evicted_keys"]
  namepass = ["redis_*"]
  fieldexclude = ["redis_*"]

# ================================
# System Metrics
# ================================
[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false

[[inputs.disk]]
  mount_points = ["/"]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

[[inputs.diskio]]
  devices = ["*"]
  skip_serial_number = false

[[inputs.mem]]
  fieldpass = ["available", "available_percent", "used", "used_percent", "free", "total", "cached", "buffers"]

[[inputs.net]]
  interfaces = ["eth*"]
  fieldpass = ["bytes_sent", "bytes_recv", "packets_sent", "packets_recv", "err_in", "err_out", "drop_in", "drop_out"]

# ================================
# Process Monitoring
# ================================
[[inputs.procstat]]
  pattern = "celery"
  user = "root"

# ================================
# Docker Metrics
# ================================
[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  source_tag = false
  container_names = []
  timeout = "5s"

# ================================
# Output to Prometheus format
# ================================
[[outputs.prometheus_client]]
  listen = ":9200"
  metric_version = 2
  expiration_interval = "60s"
  collectors_exclude = ["gocollector", "process"]

# ================================
# Basic Tags
# ================================
[global_tags]
  environment = "development"
  service = "football-prediction"
  team = "ml-team"