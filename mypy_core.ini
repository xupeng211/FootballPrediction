[mypy]
# V9.7 核心模块类型检查配置
# 专注于核心业务逻辑的类型安全

python_version = "3.11"
warn_return_any = true
warn_unused_configs = true

# 对核心模块使用严格检查
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true

# 放宽某些规则以适应遗留代码
# disallow_incomplete_defs = false  # 允许部分不完整
# disallow_untyped_decorators = false  # 允许未类型化装饰器

[mypy-src.logic.*]
strict = true
disallow_untyped_defs = true
disallow_incomplete_defs = true

[mypy-src.ml.standard_backtester]
strict = true
disallow_untyped_defs = true
disallow_incomplete_defs = true

[mypy-src.ml.standard_trainer]
strict = true
disallow_untyped_defs = true
disallow_incomplete_defs = true

# 忽略第三方库类型
[mypy-numpy.*]
ignore_missing_imports = true

[mypy-pandas.*]
ignore_missing_imports = true

[mypy-sklearn.*]
ignore_missing_imports = true

[mypy-xgboost.*]
ignore_missing_imports = true