# ==================== Football Prediction System - 生产环境配置 ====================
version: '3.8'

services:
  app:
    build:
      context: .
      target: runtime
    image: football-prediction:v2.0-stable
    container_name: football-prediction-app
    ports:
      - "8000:8000"
      - "9090:9090"  # Prometheus metrics
    env_file:
      - .env.production
    environment:
      - ENVIRONMENT=production
      - DB_HOST=db
      - REDIS_HOST=redis
      # 移除代理以避免构建时网络超时
      # - HTTP_PROXY=http://172.25.16.1:7890
      # - HTTPS_PROXY=http://172.25.16.1:7890
      - NO_PROXY=localhost,127.0.0.1,db,redis,frontend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
      - /tmp:/tmp
    networks:
      - football-production-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4GB
        reservations:
          cpus: '1.0'
          memory: 2GB

  db:
    image: postgres:15
    container_name: football-prediction-db
    environment:
      - POSTGRES_DB=football_prediction
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=StrongProdPassword123
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - football-production-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d football_prediction"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2GB
        reservations:
          cpus: '0.5'
          memory: 1GB
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=512MB
      -c effective_cache_size=1GB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB

  redis:
    image: redis:7-alpine
    container_name: football-prediction-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - football-production-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512MB
        reservations:
          cpus: '0.2'
          memory: 256MB
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes --requirepass RedisProdPassword123456

  nginx:
    image: nginx:alpine
    container_name: football-prediction-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - football-production-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ==================== 监控栈 ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: football-prediction-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - football-production-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: football-prediction-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=GrafanaProdSecurePassword2024
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - football-production-network
    restart: unless-stopped

  # ==================== 日志收集 ====================
  loki:
    image: grafana/loki:latest
    container_name: football-prediction-loki
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - football-production-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: football-prediction-promtail
    volumes:
      - ./config/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/football-prediction:ro
      - /var/log:/var/log/host:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - football-production-network
    restart: unless-stopped

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

networks:
  football-production-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16