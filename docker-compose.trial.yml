# ==============================================
# 足球预测系统试运营环境配置
# v2.1.0-stable - 生产试运行专用
# ==============================================

services:
  # ==============================================
  # 核心应用服务
  # ==============================================
  app:
    build:
      context: .
      target: runtime
    container_name: football-prediction-app
    ports:
      - "8000:8000"
    env_file:
      - .env.trial
    environment:
      # 确保容器间网络通信
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=football_prediction_prod
      - DB_USER=football_user
      - DB_PASSWORD=postgres_prod_2024_secure
      - REDIS_URL=redis://redis:6379/0
    entrypoint: []
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--log-level", "info"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
      - ./logs:/app/logs
      - ./data:/app/data
      - model_data:/app/data/models
      - trial_logs:/app/logs/trial
    networks:
      - trial-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          cpus: '0.75'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==============================================
  # PostgreSQL 数据库 (保留历史数据)
  # ==============================================
  db:
    image: postgres:15
    container_name: football-prediction-db
    environment:
      - POSTGRES_DB=football_prediction_prod
      - POSTGRES_USER=football_user
      - POSTGRES_PASSWORD=postgres_prod_2024_secure
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_trial_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - trial-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    # 注意：端口不暴露到宿主机，仅容器间访问
    expose:
      - "5432"

  # ==============================================
  # Redis 缓存服务
  # ==============================================
  redis:
    image: redis:7-alpine
    container_name: football-prediction-redis
    volumes:
      - redis_trial_data:/data
    networks:
      - trial-network
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    # 注意：端口不暴露到宿主机，仅容器间访问
    expose:
      - "6379"

  # ==============================================
  # 监控栈
  # ==============================================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: football-prediction-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_trial_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - trial-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  grafana:
    image: grafana/grafana:10.1.0
    container_name: football-prediction-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_trial_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123_change_me
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=redis-datasource,grafana-piechart-panel
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
    networks:
      - trial-network
    restart: unless-stopped
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ==============================================
  # 监控导出器
  # ==============================================
  redis-exporter:
    image: oliver006/redis_exporter:v1.45.0
    container_name: football-prediction-redis-exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      - redis
    networks:
      - trial-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

  node-exporter:
    image: prom/node-exporter:v1.6.0
    container_name: football-prediction-node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - trial-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

  # ==============================================
  # 可选：Nginx 反向代理
  # ==============================================
  nginx:
    image: nginx:alpine
    container_name: football-prediction-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
      - grafana
    networks:
      - trial-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M

# ==============================================
# 卷配置 (保留现有数据)
# ==============================================
volumes:
  postgres_trial_data:
    driver: local
    # 重要：如果现有数据在其他卷中，可以在这里映射
    # external: true
    # name: football_prediction_postgres_data
  redis_trial_data:
    driver: local
  model_data:
    driver: local
  trial_logs:
    driver: local
  prometheus_trial_data:
    driver: local
  grafana_trial_data:
    driver: local

# ==============================================
# 网络配置
# ==============================================
networks:
  trial-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16