[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "football-prediction"
version = "2.0.0"
description = "Modern football prediction system with ML inference and Service Layer architecture"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Football Prediction Team", email = "team@footballprediction.com"}
]
maintainers = [
    {name = "Football Prediction Team", email = "team@footballprediction.com"}
]
keywords = ["football", "prediction", "machine-learning", "fastapi", "docker"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
requires-python = ">=3.11"
dependencies = [
    # FastAPI & Web
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "python-multipart>=0.0.6",

    # Database & ORM
    "sqlalchemy>=2.0.0",
    "asyncpg>=0.29.0",
    "alembic>=1.12.0",

    # Caching
    "redis>=5.0.0",
    "hiredis>=2.2.0",

    # Machine Learning
    "xgboost>=2.0.0",
    "scikit-learn>=1.3.0",
    "numpy>=1.24.0",
    "pandas>=2.1.0",
    "shap>=0.42.0",

    # Data Processing
    "pyarrow>=13.0.0",
    "openpyxl>=3.1.0",

    # HTTP & API
    "httpx>=0.25.0",
    "aiohttp>=3.9.0",

    # Configuration & Environment
    "pydantic>=2.4.0",
    "pydantic-settings>=2.0.0",
    "python-dotenv>=1.0.0",

    # Logging & Monitoring
    "structlog>=23.1.0",
    "prometheus-client>=0.18.0",

    # Utilities
    "click>=8.1.0",
    "rich>=13.6.0",
    "typer>=0.9.0",
]

[project.optional-dependencies]
dev = [
    # Testing
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.12.0",
    "pytest-xdist>=3.3.0",
    "pytest-benchmark>=4.0.0",

    # Code Quality
    "black>=23.10.0",
    "isort>=5.12.0",
    "flake8>=6.1.0",
    "mypy>=1.7.0",
    "bandit>=1.7.5",
    "safety>=3.0.0",

    # Documentation
    "pydocstyle>=6.3.0",
    "sphinx>=7.2.0",
    "sphinx-rtd-theme>=1.3.0",

    # Pre-commit
    "pre-commit>=3.5.0",

    # Performance profiling
    "memory-profiler>=0.61.0",
    "line-profiler>=4.1.0",

    # Development utilities
    "ipython>=8.16.0",
    "jupyter>=1.0.0",
    "watchdog>=3.0.0",
]

test = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.12.0",
    "pytest-xdist>=3.3.0",
    "factory-boy>=3.3.0",
    "faker>=19.12.0",
    "httpx>=0.25.0",
    "redis>=5.0.0",
    "asyncpg>=0.29.0",
]

docs = [
    "sphinx>=7.2.0",
    "sphinx-rtd-theme>=1.3.0",
    "myst-parser>=2.0.0",
    "sphinx-autodoc-typehints>=1.24.0",
    "sphinx-copybutton>=0.5.0",
]

production = [
    "gunicorn>=21.2.0",
    "sentry-sdk[fastapi]>=1.38.0",
]

[project.urls]
Homepage = "https://github.com/xupeng211/FootballPrediction"
Documentation = "https://footballprediction.readthedocs.io"
Repository = "https://github.com/xupeng211/FootballPrediction.git"
"Bug Tracker" = "https://github.com/xupeng211/FootballPrediction/issues"
Changelog = "https://github.com/xupeng211/FootballPrediction/blob/main/CHANGELOG.md"

[project.scripts]
football-predict = "scripts.predict_match_v2:main"
football-dev = "scripts.docker_manager:main"

# ================================
# Black Configuration
# ================================
[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

# ================================
# isort Configuration
# ================================
[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 88
known_first_party = ["src", "scripts", "tests"]
known_third_party = [
    "fastapi", "sqlalchemy", "xgboost", "pandas", "numpy",
    "pydantic", "pytest", "redis", "httpx"
]
sections = ["FUTURE", "STDLIB", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

# ================================
# MyPy Configuration
# ================================
[tool.mypy]
python_version = "3.11"
explicit_package_bases = true
strict = true
namespace_packages = false
mypy_path = "."
files = ["src"]
package_root = "src"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[[tool.mypy.overrides]]
module = [
    "xgboost.*",
    "shap.*",
    "sklearn.*",
    "pandas.*",
    "numpy.*",
    "redis.*",
    "structlog.*",
    "prometheus_client.*",
]
ignore_missing_imports = true

# ================================
# Pytest Configuration
# ================================
[tool.pytest.ini_options]
minversion = "7.0"
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
    "--cov=src",
    "--cov-report=term-missing",
    "--cov-report=html",
    "--cov-report=xml",
    "--cov-fail-under=80",
]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "unit: Unit tests (fast, no external dependencies)",
    "integration: Integration tests (requires external services)",
    "e2e: End-to-end tests (full workflow)",
    "slow: Slow running tests",
    "security: Security-related tests",
    "performance: Performance tests",
    "api: API tests",
    "ml: Machine learning tests",
]
filterwarnings = [
    "error",
    "ignore::UserWarning",
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

# ================================
# Coverage Configuration
# ================================
[tool.coverage.run]
source = ["src"]
branch = true
omit = [
    "*/tests/*",
    "*/test_*",
    "*/__pycache__/*",
    "*/migrations/*",
    "*/venv/*",
    "*/.venv/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]
fail_under = 80
show_missing = true
precision = 2

[tool.coverage.html]
directory = "htmlcov"

# ================================
# Bandit Configuration
# ================================
[tool.bandit]
exclude_dirs = ["tests", "*/migrations/*"]
skips = ["B101", "B601"]