[build-system]
requires = ["setuptools>=65.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "football-prediction"
version = "26.7.0"
description = "FootballPrediction V26.7 - 对齐预测引擎 (56% 真赛前准确率, 训练-推理完全对齐)"
authors = [
    {name = "Claude AI Architecture Team", email = "claude@anthropic.com"}
]
maintainers = [
    {name = "FootballPrediction Development Team", email = "dev@footballprediction.ai"}
]
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
keywords = ["football", "prediction", "xgboost", "machine-learning", "adaptive-feature-engineering"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed"
]

dependencies = [
    # Core ML dependencies
    "xgboost>=2.0.0",
    "scikit-learn>=1.5.0",
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "joblib>=1.3.0",

    # Data processing
    "psycopg2-binary>=2.9.0",
    "asyncpg>=0.29.0",  # Async PostgreSQL driver for FastAPI
    "sqlalchemy>=2.0.0",  # ORM for database models
    "alembic>=1.12.0",  # Database migration tool
    "redis>=4.5.0",
    "aiohttp>=3.8.0",
    "brotli>=1.0.0",  # Added for FotMob API response decompression

    # Configuration & validation
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "python-dotenv>=1.0.0",

    # Retry & resilience
    "tenacity>=8.2.0",

    # Web framework
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "python-multipart>=0.0.16",

    # Monitoring & logging
    "prometheus-client>=0.17.0",
    "structlog>=23.1.0",

    # Utilities
    "click>=8.1.0",
    "rich>=13.0.0",
    "typer>=0.9.0",
    "httpx>=0.25.0",
    "requests>=2.31.0",

    # V19.4 新增 - 实时巡检和运维调度
    "apscheduler>=3.10.0",
    "beautifulsoup4>=4.12.0",
    "lxml>=4.9.0"
]

[project.optional-dependencies]
dev = [
    # Code quality
    "ruff>=0.1.0",
    "black>=23.7.0",
    "isort>=5.12.0",
    "flake8>=6.0.0",
    "mypy>=1.5.0",
    "bandit>=1.7.0",
    "vulture>=2.7",

    # Testing (V36.0: 异步测试支持)
    "pytest>=7.4.0",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.15.0",
    "pytest-xdist>=3.3.0",
    "pytest-postgresql>=7.0.0",
    "httpx>=0.25.0",

    # Documentation
    "mkdocs>=1.5.0",
    "mkdocs-material>=9.1.0",
    "mkdocstrings[python]>=0.22.0",

    # Development tools
    "pre-commit>=3.3.0",
    "tox>=4.11.0"
]

monitoring = [
    "grafana-api>=1.0.3",
    "prometheus-client>=0.17.0",
    "psutil>=5.9.0",
    "aioprometheus>=22.0.0"
]

ml = [
    "optuna>=3.3.0",
    "mlflow>=2.7.0",
    "shap>=0.42.0",
    "joblib>=1.3.0",
    "dask>=2023.8.0"
]

all = [
    "football-prediction[dev,monitoring,ml]"
]

[project.urls]
Homepage = "https://github.com/footballprediction/football-prediction"
Documentation = "https://footballprediction.readthedocs.io/"
Repository = "https://github.com/footballprediction/football-prediction.git"
"Bug Tracker" = "https://github.com/footballprediction/football-prediction/issues"
Changelog = "https://github.com/footballprediction/football-prediction/blob/main/CHANGELOG.md"

[project.scripts]
football-predict = "src.core.main_engine_v5:main"
football-train = "src.train:main"
football-server = "src.main:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["src/*"]

[tool.setuptools.package-data]
"*" = ["*.json", "*.yaml", "*.yml", "*.txt", "*.md"]

[tool.black]
line-length = 120
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 120
known_first_party = ["src"]
known_third_party = ["xgboost", "sklearn", "pandas", "numpy", "aiohttp", "psycopg2", "redis"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[[tool.mypy.overrides]]
module = [
    "xgboost.*",
    "sklearn.*",
    "pandas.*",
    "numpy.*",
    "psycopg2.*",
    "redis.*",
    "tenacity.*"
]
ignore_missing_imports = true

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --strict-markers --strict-config"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "ml: marks tests as machine learning tests",
    "api: marks tests as API tests"
]

[tool.coverage.run]
source = ["src"]
omit = [
    "*/tests/*",
    "*/test_*",
    "*/__pycache__/*",
    "*/migrations/*"
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:"
]

[tool.bandit]
exclude_dirs = ["tests", "migrations"]
skips = ["B101", "B601"]

[tool.flake8]
max-line-length = 120
extend-ignore = ["E203", "W503", "E501"]
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    ".eggs",
    "*.egg",
    "build",
    "dist",
    "migrations"
]
per-file-ignores = [
    "__init__.py:F401"
]

# Ruff - Modern Python linter (推荐使用，替代 Black/Flake8)
[tool.ruff]
line-length = 120
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
# 启用的规则集
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "C90", # mccabe complexity
]

# 忽略的规则（Ruff 格式）
ignore = [
    # E203, E501 由 formatter 自动处理
]

# 每文件忽略规则
[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # 未使用的导入

[tool.ruff.lint.mccabe]
# 最大复杂度
max-complexity = 15

[tool.ruff.lint.isort]
known-first-party = ["src"]
known-third-party = ["xgboost", "sklearn", "pandas", "numpy", "aiohttp", "psycopg2", "redis"]

[tool.ruff.format]
# 使用双引号
quote-style = "double"
# 缩进样式
indent-style = "space"
# 跳过魔术尾随逗号
skip-magic-trailing-comma = false
# 行尾样式
line-ending = "auto"

[tool.vulture]
paths = ["src"]
min_confidence = 80
ignore_names = ["_*", "test_*", "Test*"]

[tool.typer]
typer_app = "src.main:app"
typer_imports = ["typer"]