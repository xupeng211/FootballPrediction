[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.ruff]
# 排除文件
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    "migrations",
]

# 每行最大字符数
line-length = 88

# 目标Python版本
target-version = "py311"

[tool.ruff.lint]
# 启用的规则 (企业级标准)
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
    # PEP8 naming
    "N",
]

# 忽略的规则 (Phase 2严格模式)
ignore = [
    # E402: 模块级导入不在文件顶部 - 在ML模块中允许条件导入
    "E402",
    # B008: 不要在函数参数中调用函数 - FastAPI Dependencies很常见
    "B008",
]

# 每个文件允许的未使用导入数量
unfixable = ["F401"]

[tool.ruff.lint.per-file-ignores]
# 测试文件允许更多灵活性
"tests/**/*" = [
    "F401",  # 导入但未使用
    "F811",  # 重复定义
    "E402",  # 允许测试中的条件导入
]

# __init__.py文件允许宽松
"**/__init__.py" = [
    "F401",
    "E402",
    "F811",
]

# ML模块允许特定灵活性
"src/ml/**/*" = [
    "E402",  # 允许条件导入(根据环境选择ML库)
    "F401",  # 类型检查时的导入
]

[tool.ruff.lint.isort]
known-first-party = ["src"]
known-third-party = ["fastapi", "pydantic", "sqlalchemy", "pandas", "numpy", "sklearn", "xgboost", "mlflow"]
force-single-line = false
force-sort-within-sections = true
split-on-trailing-comma = true

[tool.ruff.format]
# 使用双引号
quote-style = "double"
# 缩进风格
indent-style = "space"

[tool.mypy]
python_version = "3.11"
strict = true  # 启用严格类型检查
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

# 忽略导入错误 (第三方库类型存根)
ignore_missing_imports = true

# ML模块特定配置
[[tool.mypy.overrides]]
module = [
    "sklearn.*",
    "xgboost.*",
    "mlflow.*",
    "shap.*",
    "optuna.*",
    "seaborn.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
# Test discovery patterns
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# Asyncio configuration - ML模块需要
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

# Output configuration
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
    "--strict-config",
    "--cov=src",
    "--cov-report=term-missing",
    "--cov-report=html",
    "--cov-fail-under=80",  # Phase 2要求80%覆盖率
]

# Markers configuration for ML
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "e2e: End-to-end tests",
    "slow: Slow running tests (>30s)",
    "ml: Machine learning specific tests",
    "training: Model training tests",
    "inference: Model inference tests",
    "data: Data processing tests",
    "features: Feature engineering tests",
]

# Minimum version requirement
minversion = "6.0"

# Test paths
testpaths = ["tests"]

[tool.coverage.run]
source = ["src"]
omit = [
    "*/tests/*",
    "*/migrations/*",
    "*/__pycache__/*",
    "*/venv/*",
    "*/env/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
  | migrations
)/
'''

# Phase 2 ML 特定配置
[tool.mlflow]
# MLflow 实验跟踪配置
experiment_name = "football-prediction"
tracking_uri = "http://localhost:5000"
default_artifact_root = "mlruns"