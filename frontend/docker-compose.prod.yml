version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: football_prediction_db_prod
    restart: always
    environment:
      POSTGRES_DB: football_prediction_prod
      POSTGRES_USER: football_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_secure_password_here}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - football_prediction_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football_user -d football_prediction_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: football_prediction_redis_prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-your_redis_password_here}
    volumes:
      - redis_data_prod:/data
    networks:
      - football_prediction_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # 后端应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: football_prediction_api_prod
    restart: always
    environment:
      # 生产环境配置
      ENVIRONMENT: production
      PYTHONPATH: /app/src

      # 数据库配置
      DATABASE_URL: postgresql+asyncpg://football_user:${DB_PASSWORD:-your_secure_password_here}@db:5432/football_prediction_prod

      # Redis配置
      REDIS_URL: redis://:${REDIS_PASSWORD:-your_redis_password_here}@redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-your_redis_password_here}
      REDIS_DB: 0

      # API配置
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,https://yourdomain.com}

      # 监控配置
      ENABLE_METRICS: "true"

      # 外部API配置
      FOTMOB_X_MAS_HEADER: ${FOTMOB_X_MAS_HEADER}
      FOTMOB_X_FOO_HEADER: ${FOTMOB_X_FOO_HEADER}
    volumes:
      - ./logs:/app/logs
      - ./src:/app/src:ro
    networks:
      - football_prediction_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # 前端应用
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: football_prediction_frontend_prod
    restart: always
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    networks:
      - football_prediction_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: football_prediction_nginx_prod
    restart: always
    ports:
      - "80:80"
      # 如果需要HTTPS，取消注释下一行
      # - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # 如果需要HTTPS，取消注释下一行并添加证书文件
      # - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - football_prediction_network
    depends_on:
      - app
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

  # Celery Worker (可选)
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: football_prediction_celery_worker_prod
    restart: always
    command: celery -A src.tasks worker --loglevel=info --concurrency=2
    environment:
      ENVIRONMENT: production
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+asyncpg://football_user:${DB_PASSWORD:-your_secure_password_here}@db:5432/football_prediction_prod
      REDIS_URL: redis://:${REDIS_PASSWORD:-your_redis_password_here}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-your_redis_password_here}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-your_redis_password_here}@redis:6379/0
    volumes:
      - ./logs:/app/logs
      - ./src:/app/src:ro
    networks:
      - football_prediction_network
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Celery Beat (定时任务调度器，可选)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: football_prediction_celery_beat_prod
    restart: always
    command: celery -A src.tasks beat --loglevel=info
    environment:
      ENVIRONMENT: production
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql+asyncpg://football_user:${DB_PASSWORD:-your_secure_password_here}@db:5432/football_prediction_prod
      REDIS_URL: redis://:${REDIS_PASSWORD:-your_redis_password_here}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-your_redis_password_here}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-your_redis_password_here}@redis:6379/0
    volumes:
      - ./logs:/app/logs
      - ./src:/app/src:ro
    networks:
      - football_prediction_network
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local

networks:
  football_prediction_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
