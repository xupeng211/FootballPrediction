# V81.200 Discovery Radar Configuration
# ======================================
# This file contains the hyperparameters for the BridgeEngine
# and the Discovery Radar system.
#
# Author: V81.200 Engineering Team
# Version: V81.200 "Mapping Blitz"
# Date: 2026-01-25

# =============================================================================
# Bridge Engine Configuration
# =============================================================================
bridge_engine:
  # Fuzzy matching threshold (legacy method)
  fuzzy_threshold: 70.0

  # Premier League priority strategy
  premier_league:
    priority_seasons:
      - "2020-2021"
      - "2021-2022"
      - "2022-2023"
    priority_league: "Premier League"

# =============================================================================
# V81.200 Discovery Radar Configuration
# =============================================================================
discovery_radar:
  # Enable/disable radar as fallback mechanism
  enabled: true

  # RapidFuzz C++ engine configuration
  engine:
    scorer: "WRatio"  # WRatio: Weighted Levenshtein Ratio
    processor_count: 1  # Number of CPU cores

  # Threshold configuration
  thresholds:
    auto_approve: 85.0      # > 85%: automatically approved
    pending_review: 70.0    # 70-85%: pending manual review
    min_threshold: 65.0      # < 65%: rejected (not recorded)
    high_confidence: 90.0    # High confidence threshold

  # Candidate limits
  candidates:
    max_per_team: 5         # Maximum candidates per team
    max_total: 10           # Maximum total candidates
    league_index_size: 50    # Maximum league index size

  # Verification options
  verification:
    require_date_match: false
    date_match_window_days: 7
    require_odds_validation: false

  # Performance tuning
  performance:
    enable_caching: true    # Enable team index caching
    cache_ttl_seconds: 3600 # Cache TTL (1 hour)

# =============================================================================
# Target Leagues for Radar Scanning
# =============================================================================
target_leagues:
  - "Premier League"
  - "La Liga"
  - "Serie A"
  - "Bundesliga"
  - "Ligue 1"
  # Add more leagues as needed
