# OddsPortal URL配置
oddsportal:
  base_url: "https://www.oddsportal.com"
  results_path: "/football/{country}/{slug}/results/"
  search_path: "/search/{query}/"

# 反爬配置
anti_scraping:
  context_rebuild: true  # V41.36: 每个日期销毁重建Context
  random_delay:
    min: 10.0  # 秒
    max: 20.0  # 秒
  human_behavior:
    enabled: true
    scroll_range: [100, 500]
    mouse_move: true

# 质量门禁
quality_gates:
  similarity_threshold: 0.85  # 队名相似度阈值
  date_tolerance_hours: 24    # 日期容差
  confidence_threshold: 0.90  # 置信度阈值
  max_retry: 3                # 最大重试次数
