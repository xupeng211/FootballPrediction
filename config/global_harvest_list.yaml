# ========================================
# 采集策略配置
# ========================================
harvest_strategy:
  # 新联赛历史回填年份（默认 3 年）
  backfill_years: 3

  # 每批采集数量（避免 API 限流）
  batch_size: 50

  # 批次间隔（秒）
  batch_delay: 10

  # 是否启用 V26.5 安全锁
  enable_sentry: true

  # 哨兵配置
  sentry:
    window_size: 100
    success_rate_threshold: 0.7
    consecutive_failure_threshold: 5
    pause_duration_hours: 12

