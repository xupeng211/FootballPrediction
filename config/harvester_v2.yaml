proxy:
  wsl2_bridge_host: 172.25.16.1
  ports:
  - 7891
  - 7892
  - 7893
  - 7894
  - 7895
  - 7896
  - 7897
  - 7898
  - 7899
  - 7900
  - 7901
  - 7902
  - 7903
  - 7904
  - 7905
  - 7906
  - 7907
  - 7911
  - 7912
  health_check:
    enabled: true
    timeout_seconds: 5
    ban_duration_seconds: 1800
    max_failures: 10
retry:
  max_attempts: 4
  base_delay_seconds: 2.0
  max_delay_seconds: 60.0
  backoff_multiplier: 2.0
data_integrity:
  min_div_count: 10
  min_entities: 1
  value_ranges:
    odds:
      min: 1.01  # V41.272: 调优至 1.01，依赖物理约束（CHECK）过滤亚盘
      max: 1000.0
    xg_diff_threshold: 1.3
    xg_diff strong_threshold: 1.5
deep_search:
  search_url_template: https://www.oddsportal.com/search/{query}/
  request_delay: 2.0
  timeout: 30
  hash_pattern: /([a-f0-9]{8})/?$
  detail_page_pattern: /football/[a-z]+/[a-z0-9-]+/[a-z0-9-]+/[a-z0-9-]+/
concurrency:
  default_workers: 5
  max_workers: 12
  task_timeout: 600
auditor:
  navigation_strategy: domcontentloaded
  navigation_timeout: 90000
  wait_after_load: 5000
  network_idle_timeout: 30000
  scroll:
    iterations: 5
    delay_ms: 800
  container_width_ratio: 0.3
target_patterns:
- Opening
- Closing
- Movement
database:
  start_date: '2024-01-01'
  query_limit: 100
  batch_size: 10
logging:
  level: INFO
  output_dir: logs
  screenshot_dir: logs
# V41.278: FotMob API configuration for lineup collector
fotmob:
  base_url: https://www.fotmob.com
  api_endpoints:
    match_details: /api/matchDetails
  request:
    timeout_seconds: 30
    follow_redirects: true
