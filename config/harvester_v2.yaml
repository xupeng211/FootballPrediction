# V41.262 Harvester V2 Configuration
# =====================================
# 工业级收割引擎配置 - 无硬编码，全参数化
#
# Author: V41.262 Architecture Team
# Date: 2026-01-20
# Version: V41.262 "Standardized Delivery"

# =============================================================================
# 代理配置 (Proxy Configuration)
# =============================================================================
proxy:
  # WSL2 桥接主机
  wsl2_bridge_host: "172.25.16.1"

  # 代理端口池（轮换策略）- 18 个日本代理端口
  ports:
    - 7892
    - 7893
    - 7894
    - 7895
    - 7896
    - 7897
    - 7898
    - 7899
    - 7900
    - 7901
    - 7902
    - 7903
    - 7904
    - 7905
    - 7906
    - 7907
    - 7908
    - 7909
    - 7910

  # 代理健康检查
  health_check:
    enabled: true
    timeout_seconds: 5
    ban_duration_seconds: 1800  # 30 分钟
    max_failures: 10

# =============================================================================
# 重试配置 (Retry Configuration)
# =============================================================================
retry:
  # 最大重试次数
  max_attempts: 4

  # 基础延迟（秒）
  base_delay_seconds: 2.0

  # 最大延迟（秒）
  max_delay_seconds: 60.0

  # 指数退避因子
  backoff_multiplier: 2.0

# =============================================================================
# 数据完整性配置 (Data Integrity Configuration)
# =============================================================================
data_integrity:
  # 最小 div 数量阈值（检测残缺页面）
  min_div_count: 10

  # 最小 entities 数量
  min_entities: 1

  # 数值范围验证
  value_ranges:
    # 赔率范围
    odds:
      min: 1.01
      max: 1000.0

    # xG 差异阈值（用于列顺序验证）
    xg_diff_threshold: 1.3
    xg_diff strong_threshold: 1.5

# =============================================================================
# 深度搜索配置 (Deep Search Configuration)
# =============================================================================
deep_search:
  # OddsPortal 搜索 URL 模板
  search_url_template: "https://www.oddsportal.com/search/{query}/"

  # 请求间隔（秒）
  request_delay: 2.0

  # 搜索超时（秒）
  timeout: 30

  # Hash 提取模式
  hash_pattern: "/([a-f0-9]{8})/?$"

  # 详情页 URL 模式
  detail_page_pattern: "/football/[a-z]+/[a-z0-9-]+/[a-z0-9-]+/[a-z0-9-]+/"

# =============================================================================
# 并发配置 (Concurrency Configuration)
# =============================================================================
concurrency:
  # 默认并发数
  default_workers: 2

  # 最大并发数
  max_workers: 5

  # 超时时间（秒）
  task_timeout: 600

# =============================================================================
# 审计器配置 (Auditor Configuration)
# =============================================================================
auditor:
  # 导航策略
  navigation_strategy: "domcontentloaded"  # domcontentloaded | networkidle | load

  # 导航超时（毫秒）
  navigation_timeout: 90000

  # 加载后等待时间（毫秒）
  wait_after_load: 5000

  # 网络空闲超时（毫秒）
  network_idle_timeout: 30000

  # 滚动配置
  scroll:
    iterations: 5
    delay_ms: 800

  # 容器宽度阈值比例
  container_width_ratio: 0.3

# =============================================================================
# 目标模式配置 (Target Patterns)
# =============================================================================
target_patterns:
  - "Opening"
  - "Closing"
  - "Movement"

# =============================================================================
# 数据库查询配置 (Database Query Configuration)
# =============================================================================
database:
  # 起始日期
  start_date: "2024-01-01"

  # 查询限制
  query_limit: 100

  # 批量大小
  batch_size: 10

# =============================================================================
# 日志配置 (Logging Configuration)
# =============================================================================
logging:
  # 日志级别
  level: "INFO"  # DEBUG | INFO | WARNING | ERROR

  # 输出目录
  output_dir: "logs"

  # 截图目录
  screenshot_dir: "logs"
