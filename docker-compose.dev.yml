# =============================================================================
# FootballPrediction - 开发环境 Docker Compose
# =============================================================================
# 版本: V175-Stable
# 用途: 全程容器化开发模式
# 特性: 热更新、代理支持、完整开发工具链
# =============================================================================
# 使用方式:
#   docker-compose -f docker-compose.dev.yml up -d    # 启动开发环境
#   docker-compose -f docker-compose.dev.yml exec dev bash  # 进入开发容器
#   docker-compose -f docker-compose.dev.yml down     # 停止开发环境
# =============================================================================

services:
  # ===========================================================================
  # dev - 开发容器 (Python 3.11 + Node.js 20)
  # ===========================================================================
  dev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      args:
        INSTALL_PLAYWRIGHT: "true"
        # 构建时代理（仅在显式设置 DEV_HTTP_PROXY / DEV_HTTPS_PROXY 时启用）
        HTTP_PROXY: ${DEV_HTTP_PROXY:-}
        HTTPS_PROXY: ${DEV_HTTPS_PROXY:-}
    image: footballprediction:v175-stable
    container_name: football_prediction_dev
    restart: unless-stopped
    # V175: 使用 tini 作为 init 系统，自动回收僵尸进程
    init: true

    # 热更新: 挂载本地代码目录
    volumes:
      # 主代码目录 - 双向同步
      - .:/app:cached
      # 排除 node_modules（使用容器内的）
      - "${DEV_NODE_MODULES_MOUNT:-/app/node_modules}"
      # 持久化缓存
      - "${DEV_CACHE_MOUNT:-dev_cache:/root/.cache}"
      - "${DEV_NPM_MOUNT:-dev_npm:/root/.npm}"
      # Git 配置持久化
      - "${DEV_GITCONFIG_MOUNT:-dev_gitconfig:/root/.config/git}"
      # ============================================================
      # V172-L2-04: 浏览器身份持久化 (Turnstile 绕过)
      # ============================================================
      - ./data/browser_profile:/app/data/browser_profile
      # Playwright 浏览器缓存
      - "${PLAYWRIGHT_CACHE_MOUNT:-playwright_cache:/root/.cache/ms-playwright}"
      # ============================================================
      # V4.50: 测试数据标本挂载
      # ============================================================
      - ./tests/fixtures:/app/tests/fixtures

    # 工作目录
    working_dir: /app

    # 环境变量
    environment:
      # Docker 环境标识
      - DOCKER_ENV=true
      - DOCKER_DEV_CONTAINER=true
      # 时区
      - TZ=Asia/Shanghai
      # 数据库连接（连接到宿主机）
      - HOST_LOOPBACK_GATEWAY=${HOST_LOOPBACK_GATEWAY:-192.168.65.254}
      - DB_HOST=${HOST_LOOPBACK_GATEWAY:-192.168.65.254}
      - DB_PORT=5432
      - DB_NAME=football_db
      - DB_USER=${DB_USER:-football_user}
      - DB_PASSWORD=${DB_PASSWORD:-football_pass}
      # Redis 连接
      - REDIS_HOST=${HOST_LOOPBACK_GATEWAY:-192.168.65.254}
      - REDIS_PORT=6379
      # WSL2 Mirrored + Docker bridge: 容器内使用宿主网关直连，避免每次解析 host.docker.internal
      - PROXY_HOST=${HOST_LOOPBACK_GATEWAY:-192.168.65.254}
      - WSL2_PROXY_HOST=${HOST_LOOPBACK_GATEWAY:-192.168.65.254}
      - PROXY_PROTOCOL=socks5
      # 代理配置（仅在显式设置 DEV_* 变量时启用）
      - HTTP_PROXY=${DEV_HTTP_PROXY:-}
      - HTTPS_PROXY=${DEV_HTTPS_PROXY:-}
      - CONTAINER_PROXY=${DEV_CONTAINER_PROXY:-}
      - NO_PROXY=localhost,127.0.0.1,${HOST_LOOPBACK_GATEWAY:-192.168.65.254}
      # Python 配置
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      # Node.js 配置
      - NODE_ENV=development
      - NODE_OPTIONS=--max-old-space-size=4096
      # ============================================================
      # V172-L2-04: 浏览器 Profile 路径
      # ============================================================
      - BROWSER_PROFILE_PATH=/app/data/browser_profile

    # 端口映射
    ports:
      - "${API_PORT:-8000}:8000"    # API 服务
      - "${DASHBOARD_PORT:-3000}:3000"  # Dashboard
      - "${DEBUG_PORT:-5678}:5678"  # Python Debug

    # 健康检查
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    # V6.6: 共享内存配置 - 10 线程 Playwright/Chromium 需要充足 shm
    shm_size: '2gb'

    # 资源限制（Ryzen 9900X 优化）
    deploy:
      resources:
        limits:
          cpus: "${DEV_CONTAINER_CPU_LIMIT:-12.0}"
          memory: 16G
        reservations:
          cpus: "${DEV_CONTAINER_CPU_RESERVATION:-2.0}"
          memory: 4G

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

    # 依赖服务
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ===========================================================================
  # db - PostgreSQL 15 数据库
  # ===========================================================================
  db:
    image: postgres:15-alpine
    container_name: football_prediction_db_dev
    restart: always

    environment:
      - POSTGRES_DB=${DB_NAME:-football_db}
      - POSTGRES_USER=${DB_USER:-football_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-football_pass}
      - PGDATA=/var/lib/postgresql/data/pgdata
      # 性能优化
      - MAX_CONNECTIONS=100
      - SHARED_BUFFERS=256MB

    ports:
      - "${DB_PORT:-5432}:5432"

    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./deploy/docker/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-football_user} -d ${DB_NAME:-football_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # redis - Redis 7 缓存服务
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: football_prediction_redis_dev
    restart: always

    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10

    ports:
      - "${REDIS_PORT:-6379}:6379"

    volumes:
      - redis_dev_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ===========================================================================
  # prometheus - Prometheus 监控服务
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: football_prediction_prometheus
    restart: unless-stopped

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=7d'

    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # grafana - Grafana 可视化服务
  # ===========================================================================
  grafana:
    image: grafana/grafana:10.2.2
    container_name: football_prediction_grafana
    restart: unless-stopped

    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-titan2024}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=grafana-clock-panel

    ports:
      - "${GRAFANA_PORT:-3001}:3000"

    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/monitoring/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    depends_on:
      - prometheus

# =============================================================================
# 数据卷
# =============================================================================
volumes:
  postgres_dev_data:
    driver: local
    name: footballprediction_postgres_dev_data
  redis_dev_data:
    driver: local
    name: footballprediction_redis_dev_data
  dev_cache:
    driver: local
    name: footballprediction_dev_cache
  dev_npm:
    driver: local
    name: footballprediction_dev_npm
  dev_gitconfig:
    driver: local
    name: footballprediction_dev_gitconfig
  # V172-L2-04: Playwright 浏览器缓存
  playwright_cache:
    driver: local
    name: footballprediction_playwright_cache
  # V4.46.6: 监控栈数据卷
  prometheus_data:
    driver: local
    name: footballprediction_prometheus_data
  grafana_data:
    driver: local
    name: footballprediction_grafana_data

# =============================================================================
# 网络
# =============================================================================
networks:
  default:
    name: football_prediction_dev_network
    driver: bridge
