# 开发环境配置 - v2.0 架构 v2.0
# 特性：热重载、调试端口、开发工具

services:
  app:
    build:
      context: .
      target: development
    ports:
      - "8000:8000"  # FastAPI 应用
      - "5678:5678"  # debugpy 调试器
    env_file:
      - .env.dev
    environment:
      # 基础配置
      - ENVIRONMENT=development
      - TZ=UTC
      - PYTHONPATH=/app/src

      # 数据库配置
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=football_prediction_dev
      - DB_USER=football_user
      - DB_PASSWORD=football_pass

      # Redis 配置
      - REDIS_URL=redis://redis:6379/0

      # v2.0 服务配置 (开发环境全部启用)
      - INFERENCE_SERVICE_V2_ENABLED=true
      - COLLECTION_SERVICE_ENABLED=true
      - EXPLAINABILITY_SERVICE_ENABLED=true

      # 模型配置
      - MODEL_PATH=/app/data/models
      - DEFAULT_MODEL_NAME=xgboost_v2

      # API 配置
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_DEBUG=true
      - API_RELOAD=true

      # 开发配置
      - LOG_LEVEL=DEBUG
      - ENABLE_PROFILING=true
      - ENABLE_DOCS=true

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      # 开发热重载
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./tests:/app/tests
      - ./docker:/app/docker
      - ./logs:/app/logs
      - ./data:/app/data
      - model_data:/app/data/models
      - cache_data:/app/data/cache

    networks:
      - football-network

    restart: unless-stopped

    # 开发环境启动命令
    command: >
      sh -c "
        echo '🚀 启动开发环境...' &&
        python -m uvicorn src.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/src
        --log-level debug
        --access-log
      "

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=football_prediction_dev
      - POSTGRES_USER=football_user
      - POSTGRES_PASSWORD=football_pass
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - football-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football_user -d football_prediction_dev"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - football-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru

  # 开发工具服务
  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=db
    depends_on:
      - db
    networks:
      - football-network
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    networks:
      - football-network
    restart: unless-stopped

  # 测试服务 (可选)
  pytest:
    build:
      context: .
      target: development
    environment:
      - ENVIRONMENT=test
      - PYTHONPATH=/app/src
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./scripts:/app/scripts
    networks:
      - football-network
    profiles:
      - testing
    command: >
      sh -c "
        echo '🧪 运行测试套件...' &&
        python -m pytest
        tests/
        -v
        --cov=src
        --cov-report=html
        --cov-report=term-missing
        --tb=short
      "

  # 代码质量检查
  quality-check:
    build:
      context: .
      target: development
    environment:
      - PYTHONPATH=/app/src
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./scripts:/app/scripts
    networks:
      - football-network
    profiles:
      - quality
    command: >
      sh -c "
        echo '🔍 代码质量检查...' &&
        echo '格式化代码...' &&
        black --check src/ &&
        echo '检查代码风格...' &&
        flake8 src/ &&
        echo '类型检查...' &&
        mypy src/ ||
        echo '质量检查完成 (存在警告)'
      "

  # 开发数据收集器 (独立服务)
  data-collector:
    build:
      context: .
      target: development
    environment:
      - ENVIRONMENT=development
      - PYTHONPATH=/app/src
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=football_prediction_dev
      - DB_USER=football_user
      - DB_PASSWORD=football_pass
      - SERVICE_MODE=collector
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - football-network
    profiles:
      - collectors
    command: >
      python -m src.services.collection_service
      --mode=continuous
      --interval=300

volumes:
  postgres_data_dev:
    driver: local
  redis_data_dev:
    driver: local
  model_data:
    driver: local
  cache_data:
    driver: local

networks:
  football-network:
    driver: bridge