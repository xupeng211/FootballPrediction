name: FootballPrediction CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_DEFAULT_VERSION: "3.11"

jobs:
  quality-checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_DEFAULT_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Check code formatting with Black
      run: |
        echo "🎨 Running Black formatting check..."
        black --check --diff src/

    - name: Check import sorting with isort
      run: |
        echo "📚 Running isort check..."
        isort --check-only --diff src/

    - name: Lint with flake8
      run: |
        echo "🔍 Running flake8 linting..."
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Type checking with MyPy
      run: |
        echo "🔎 Running MyPy type checking..."
        mypy src/ --no-error-summary || true

    - name: Security check with Bandit
      run: |
        echo "🛡️ Running Bandit security analysis..."
        bandit -r src/ -f json -o bandit-report.json || true

    - name: Check for dead code with Vulture
      run: |
        echo "🦅 Running Vulture dead code analysis..."
        vulture src/ --min-confidence 80 || true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_DEFAULT_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Start services
      run: |
        echo "🐳 Starting required services..."
        docker-compose up -d db redis
        echo "⏳ Waiting for services to be ready..."
        sleep 10

    - name: Wait for database
      run: |
        echo "🗄️ Waiting for PostgreSQL..."
        timeout 60 bash -c 'until docker-compose exec -T db pg_isready -U football_user; do sleep 2; done'

    - name: Run tests with coverage
      run: |
        echo "🧪 Running unit tests with coverage..."
        pytest tests/unit/ --cov=src --cov-report=xml --cov-report=html --cov-report=term-missing -v

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Stop services
      if: always()
      run: |
        echo "🛑 Stopping services..."
        docker-compose down

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_DEFAULT_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Start services
      run: |
        echo "🐳 Starting full service stack..."
        docker-compose up -d
        echo "⏳ Waiting for all services to be ready..."
        sleep 15

    - name: Wait for services
      run: |
        echo "🗄️ Waiting for PostgreSQL..."
        timeout 60 bash -c 'until docker-compose exec -T db pg_isready -U football_user; do sleep 2; done'
        echo "🔴 Waiting for Redis..."
        timeout 30 bash -c 'until docker-compose exec -T redis redis-cli ping; do sleep 1; done'

    - name: Initialize database schema
      run: |
        echo "🏗️ Initializing database schema..."
        python src/core/main_engine_v5.py --mode test

    - name: Run integration tests
      run: |
        echo "🔗 Running integration tests..."
        pytest tests/integration/ -v --maxfail=1

    - name: Test feature extraction
      run: |
        echo "🎯 Testing 106-feature extraction..."
        python3 -c "
from src.data_access.processors.advanced_feature_extractor import AdvancedFeatureExtractor
extractor = AdvancedFeatureExtractor()
test_data = {
    'content': {
        'stats': {
            'Periods': {
                'All': {
                    'stats': [{
                        'key': 'top_stats',
                        'stats': [
                            {'key': 'expected_goals', 'stats': [1.5, 0.8]},
                            {'key': 'BallPossesion', 'stats': [55, 45]},
                            {'key': 'CornerKicks', 'stats': [7, 3]},
                            {'key': 'YellowCards', 'stats': [2, 4]},
                            {'key': 'Shots', 'stats': [12, 15]}
                        ]
                    }]
                }
            }
        }
    },
    'general': {
        'homeTeam': {'name': 'Test Home'},
        'awayTeam': {'name': 'Test Away'}
    }
}
features = extractor.extract_complete_features(test_data, 'integration_test')
assert features.home_xg == 1.5
assert features.home_possession == 55.0
assert features.home_corners == 7
assert features.home_yellow_cards == 2
assert features.home_shots_total == 12
assert features.home_team == 'Test Home'
assert features.away_team == 'Test Away'
print('✅ Feature extraction test passed')
"

    - name: Stop services
      if: always()
      run: |
        echo "🛑 Stopping services..."
        docker-compose down

  build-test:
    name: Build Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_DEFAULT_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
        cache: 'pip'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: |
        echo "📦 Building package..."
        python -m build

    - name: Check package
      run: |
        echo "🔍 Checking built package..."
        twine check dist/*

  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_DEFAULT_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Run performance benchmarks
      run: |
        echo "⚡ Running performance tests..."
        python -m pytest tests/performance/ -v --benchmark-only || true

  docs-build:
    name: Documentation Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_DEFAULT_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Build documentation
      run: |
        echo "📚 Building documentation..."
        if [ -f "mkdocs.yml" ]; then
          mkdocs build
        else
          echo "No mkdocs.yml found, skipping documentation build"
        fi

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [quality-checks, unit-tests, integration-tests]
    if: github.ref == 'refs/heads/develop'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to staging
      run: |
        echo "🚀 Deploying to staging environment..."
        echo "Staging deployment placeholder"

    - name: Notify team
      run: |
        echo "📢 Staging deployment completed"