name: Production Gate

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  actions: write
  pull-requests: read

concurrency:
  group: production-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEV_CONTAINER_CPU_LIMIT: "2.0"
  DEV_CONTAINER_CPU_RESERVATION: "0.5"
  DEV_NODE_MODULES_MOUNT: "${{ github.workspace }}/.cache/node_modules:/app/node_modules"
  DEV_CACHE_MOUNT: "${{ github.workspace }}/.cache/dev_root_cache:/root/.cache"
  DEV_NPM_MOUNT: "${{ github.workspace }}/.cache/npm:/root/.npm"
  DEV_GITCONFIG_MOUNT: "${{ github.workspace }}/.cache/gitconfig:/root/.config/git"

jobs:
  production-gate:
    name: Environment / Proxy / Static / Unit Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare CI cache directories
        run: |
          mkdir -p \
            .cache/node_modules \
            .cache/npm \
            .cache/dev_root_cache/pip \
            .cache/gitconfig \
            .cache/buildx \
            .cache/buildx-new

      - name: Restore dependency cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/node_modules
            .cache/npm
            .cache/dev_root_cache/pip
          key: production-gate-deps-${{ runner.os }}-${{ hashFiles('package-lock.json', 'requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            production-gate-deps-${{ runner.os }}-

      - name: Restore Docker layer cache
        uses: actions/cache@v4
        with:
          path: .cache/buildx
          key: production-gate-buildx-${{ runner.os }}-${{ hashFiles('.devcontainer/Dockerfile', 'requirements.txt', 'mcp_servers/requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            production-gate-buildx-${{ runner.os }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Warm dev image cache
        run: |
          docker buildx build \
            --load \
            --tag footballprediction:v175-stable \
            --file .devcontainer/Dockerfile \
            --build-arg APT_MIRROR_HOST=deb.debian.org \
            --build-arg NPM_REGISTRY=https://registry.npmjs.org \
            --build-arg PIP_INDEX_URL=https://pypi.org/simple \
            --build-arg PIP_TRUSTED_HOST=pypi.org \
            --cache-from type=local,src=.cache/buildx \
            --cache-to type=local,dest=.cache/buildx-new,mode=min \
            .

      - name: Rotate Docker layer cache
        if: always()
        run: |
          rm -rf .cache/buildx
          if [ -d .cache/buildx-new ]; then
            mv .cache/buildx-new .cache/buildx
          fi

      - name: Print resolved dev environment
        run: |
          docker compose -f docker-compose.dev.yml config > /tmp/production-gate.compose.yml
          echo "[Production Gate] Resolved dev container environment:"
          awk '
            /^  dev:$/ { in_dev=1 }
            in_dev { print }
            in_dev && /^    working_dir:/ { exit }
          ' /tmp/production-gate.compose.yml | \
            grep -E 'DB_HOST:|DB_PORT:|DB_NAME:|REDIS_HOST:|REDIS_PORT:|PROXY_HOST:|WSL2_PROXY_HOST:|cpus:'

      - name: CI Environment Diagnostics
        env:
          DEV_DB_HOST: db
          DEV_REDIS_HOST: redis
          DEV_PROXY_HOST: 127.0.0.1
        run: |
          docker compose -f docker-compose.dev.yml up -d dev db redis
          echo "[Production Gate] Working directory:"
          pwd
          echo "[Production Gate] Container status:"
          docker compose -f docker-compose.dev.yml ps
          echo "[Production Gate] DEV_* environment variables:"
          env | grep '^DEV_' || true
          echo "[Production Gate] Container network alias probe (dev -> db):"
          docker compose -f docker-compose.dev.yml exec -T dev bash -lc 'ping -c 2 db'

      - name: Install project dependencies
        run: |
          echo "[Production Gate] Installing Node.js dependencies..."
          docker compose -f docker-compose.dev.yml exec -T dev bash -lc 'npm ci'
          echo "[Production Gate] Verifying critical dependencies..."
          docker compose -f docker-compose.dev.yml exec -T dev bash -lc 'node -e "require(\"playwright\"); require(\"pg\"); require(\"nock\"); console.log(\"✓ All critical dependencies installed\")"'

      - name: Run Gatekeeper
        env:
          GATEKEEPER_BUILD: "0"
          GATEKEEPER_CI_MODE: ${{ github.event_name == 'pull_request' && 'pr' || 'push' }}
          DEV_DB_HOST: db
          DEV_REDIS_HOST: redis
          DEV_PROXY_HOST: 127.0.0.1
          DB_BLUEPRINT_DEBUG: "1"
          DB_BLUEPRINT_CONNECT_TIMEOUT_MS: "5000"
          DB_BLUEPRINT_STATEMENT_TIMEOUT_MS: "30000"
        run: bash scripts/devops/gatekeeper.sh --mode="${GATEKEEPER_CI_MODE}"

      - name: AI Workflow Gate (P0)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_BODY_FILE="$(mktemp -t pr-body.XXXXXX)"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "[AI Workflow Gate] Fetching PR body via gh CLI for PR #${{ github.event.pull_request.number }}"
            gh pr view "${{ github.event.pull_request.number }}" --json body --jq '.body' > "${PR_BODY_FILE}"
            if [ -s "${PR_BODY_FILE}" ]; then
              echo "[AI Workflow Gate] PR body fetched ($(wc -l < "${PR_BODY_FILE}") lines, $(wc -c < "${PR_BODY_FILE}") bytes)."
              python3 scripts/ops/ai_workflow_gate.py --pr-body-file "${PR_BODY_FILE}"
            else
              echo "[AI Workflow Gate] PR body empty after fetch — running git-diff checks only."
              python3 scripts/ops/ai_workflow_gate.py --pr-body-file "${PR_BODY_FILE}" --skip-body-checks
            fi
          else
            # Push event on main — run git-diff-based checks only
            echo "[AI Workflow Gate] Push event. Running git-diff checks only."
            touch "${PR_BODY_FILE}"
            python3 scripts/ops/ai_workflow_gate.py \
              --pr-body-file "${PR_BODY_FILE}" \
              --skip-body-checks
          fi
          rm -f "${PR_BODY_FILE}"

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: production-gate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        run: |
          docker buildx build \
            --file Dockerfile \
            --build-arg NPM_REGISTRY=https://registry.npmjs.org \
            --cache-from type=gha,scope=production-image-buildx \
            --cache-to type=gha,scope=production-image-buildx,mode=min \
            .
