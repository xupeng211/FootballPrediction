---
name: Football Prediction v2.0 - CI Pipeline (Real Database Testing)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

env:
  PYTHON_VERSION: "3.11"
  NODE_ENV: "ci"

jobs:
  # ================================
  # Code Quality & Static Analysis
  # ================================
  quality:
    name: Code Quality & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Black (Code Formatting Check)
        run: |
          black --check --diff src/ scripts/ tests/
          echo "✅ Black formatting check passed"

      - name: Run Flake8 (Code Style)
        run: |
          flake8 src/ scripts/ tests/ --format=github --max-line-length=88
          echo "✅ Flake8 linting passed"

      - name: Run MyPy (Type Checking)
        run: |
          mypy src/ --ignore-missing-imports --strict-optional
          echo "✅ MyPy type checking passed"

  # ================================
  # Security Scanning
  # ================================
  security:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Bandit (Python Security Scan)
        run: |
          bandit -r src/ -f json -o bandit-report.json
          echo "✅ Bandit security scan completed"

      - name: Run Safety (Dependency Security Check)
        run: |
          safety check --json --output safety-report.json
          echo "✅ Safety dependency check completed"

      - name: Run Safety (Dependency Vulnerability Check)
        run: |
          # 使用Safety检查Python依赖的安全漏洞
          safety check --json --output safety-report.json || echo "Safety check completed with warnings"
          echo "✅ Safety dependency check completed"

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
            trivy-report.json
          retention-days: 30

  # ================================
  # Testing (V2 Testing - Real Database)
  # ================================
  test:
    name: V2 Testing
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 保留安全超时

    strategy:
      matrix:
        test-type: [v2, unit]
        include:
          - test-type: v2
            test-path: tests/v2/
            coverage-target: 75  # V2测试降低覆盖率要求
          - test-type: unit
            test-path: tests/unit/
            coverage-target: 80

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD || 'test_password' }}
          POSTGRES_DB: football_prediction_test
          POSTGRES_USER: ${{ secrets.DB_USER || 'test_user' }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3  # 减少重试次数
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s  # 加快检查频率
          --health-timeout 3s
          --health-retries 3
        ports:
          - 6379:6379

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: football_prediction_test
      DB_USER: ${{ secrets.DB_USER || 'test_user' }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'test_password' }}
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_DB: 0
      # 启用真实数据库连接测试
      MOCK_DATABASE: "false"
      MOCK_REDIS: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Wait for PostgreSQL to be ready
        run: |
          echo "🔄 等待PostgreSQL服务启动..."
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U ${{ secrets.DB_USER || 'test_user' }}; then
              echo "✅ PostgreSQL已就绪 (尝试 ${i}/30)"
              break
            else
              echo "⏳ PostgreSQL未就绪，等待中... (尝试 ${i}/30)"
              sleep 2
            fi
            if [ $i -eq 30 ]; then
              echo "❌ PostgreSQL启动超时，退出测试"
              exit 1
            fi
          done

      - name: Wait for Redis to be ready
        run: |
          echo "🔄 等待Redis服务启动..."
          for i in {1..15}; do
            if redis-cli -h localhost -p 6379 ping; then
              echo "✅ Redis已就绪 (尝试 ${i}/15)"
              break
            else
              echo "⏳ Redis未就绪，等待中... (尝试 ${i}/15)"
              sleep 2
            fi
            if [ $i -eq 15 ]; then
              echo "❌ Redis启动超时，退出测试"
              exit 1
            fi
          done

      - name: Create test database
        run: |
          echo "🔄 创建测试数据库..."
          PGPASSWORD=${{ secrets.DB_PASSWORD || 'test_password' }} psql -h localhost -p 5432 -U ${{ secrets.DB_USER || 'test_user' }} -c "
            CREATE DATABASE IF NOT EXISTS football_prediction_test;
            \c football_prediction_test;
            CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
          "
          echo "✅ 测试数据库创建完成"

      - name: Run Database Migrations
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: football_prediction_test
          DB_USER: ${{ secrets.DB_USER || 'test_user' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'test_password' }}
          DATABASE_URL: postgresql+psycopg2://${{ secrets.DB_USER || 'test_user' }}:${{ secrets.DB_PASSWORD || 'test_password' }}@localhost:5432/football_prediction_test
        run: |
          echo "🔄 执行数据库迁移..."
          echo "🔍 环境变量检查:"
          echo "  - DATABASE_URL: $DATABASE_URL"
          echo "  - PWD: $(pwd)"
          echo "  - PYTHONPATH: $PYTHONPATH"

          # 使用python -m调用alembic，确保sys.path正确
          python -m alembic upgrade head

          echo "✅ 数据库迁移完成"

      - name: Run V2 and Unit tests with Real Database
        run: |
          # 使用真实数据库连接运行测试
          pytest tests/v2/ tests/unit/ \
            --ignore=tests/legacy/ \
            --cov=src \
            --cov-report=xml:"coverage-${{ matrix.test-type }}.xml" \
            --cov-report=html:"htmlcov-${{ matrix.test-type }}" \
            --cov-fail-under="${{ matrix.coverage-target }}" \
            --junitxml:"test-results-${{ matrix.test-type }}.xml" \
            -v --tb=short -x \
            -m "not slow"  # 跳过慢速测试
        env:
          MOCK_DATABASE: "false"
          MOCK_REDIS: "false"

      - name: Upload coverage reports to Codecov
        if: matrix.test-type == 'unit'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage-unit.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.test-type }}
          path: |
            coverage-${{ matrix.test-type }}.xml
            test-results-${{ matrix.test-type }}.xml
            htmlcov-${{ matrix.test-type }}/
          retention-days: 30

  # ================================
  # Docker Build (Main branch only)
  # ================================
  build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [quality, security, test]  # 恢复test依赖
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/football-prediction
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ secrets.DOCKER_USERNAME }}/football-prediction:latest
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

  # ================================
  # Deploy (Release only)
  # ================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release' && github.event.action == 'published'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "🚀 Deploying Football Prediction System v${{ github.event.release.tag_name }}"
          echo "Docker Image: ${{ secrets.DOCKER_USERNAME }}/football-prediction:${{ github.event.release.tag_name }}"

          # Add your actual deployment commands here
          # For example:
          # docker pull ${{ secrets.DOCKER_USERNAME }}/football-prediction:${{ github.event.release.tag_name }}
          # docker-compose -f docker-compose.prod.yml up -d

          echo "✅ Deployment completed successfully!"

  # ================================
  # Notification on Failure
  # ================================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [quality, security, test]
    if: failure()

    steps:
      - name: Notify team on failure
        run: |
          echo "❌ CI/CD Pipeline Failed!"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Add Slack/Teams notification here if needed
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"CI/CD Pipeline failed for ${{ github.repository }}"}' \
          #   "${{ secrets.SLACK_WEBHOOK_URL }}"

# ================================
# Global Permissions
# ================================
permissions:
  contents: read
  packages: write
  actions: read
  checks: write
  pull-requests: write