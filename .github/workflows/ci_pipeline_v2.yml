--- 
name: CI Pipeline v2 - Clean Architecture

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual CI trigger'

env:
  NODE_VERSION: '18'
  # 移除全局SQLite配置，使用测试环境的PostgreSQL配置

jobs:
  test:
    name: 🧪 Test Matrix
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']  # V4.0: 恢复全量Python版本矩阵

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_football_prediction
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools
          pip install -r requirements-ci.txt
          sudo apt-get update && sudo apt-get install -y bc

      - name: Set up test environment
        run: |
          cat > .env.test << EOF
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/test_football_prediction
          REDIS_URL=redis://localhost:6379/0
          ENV=testing
          DEBUG=false
          LOG_LEVEL=WARNING
          PYTHONPATH=$PWD:$PYTHONPATH
          CI=true
          PYTEST_CURRENT_TEST=1
          TESTING=true
          FOOTBALL_PREDICTION_ML_MODE=mock
          INFERENCE_SERVICE_MOCK=true
          SKIP_ML_MODEL_LOADING=true
          XGBOOST_MOCK=true
          JOBLIB_MOCK=true
          EOF
          # V4.0: ML Mock环境变量 - 强制使用Mock模式避免ML依赖内存问题
          export $(cat .env.test | xargs)
          echo "✅ 测试环境已设置"

      - name: Create dummy data files
        run: |
          echo "📁 创建测试所需的数据文件..."
          mkdir -p data logs

          # 创建 dataset_v1.csv 示例数据
          cat > data/dataset_v1.csv << 'EOF'
          date,home_team,away_team,home_score,away_score,result
          2024-01-01,Manchester United,Liverpool,2,1,H
          2024-01-02,Arsenal,Chelsea,1,1,D
          2024-01-03,Manchester City,Tottenham,3,0,H
          2024-01-04,Newcastle,Everton,1,2,A
          2024-01-05,Leicester,West Ham,2,2,D
          EOF

          # 创建必要的日志文件避免测试失败
          touch logs/enhanced_ev_test.log

          echo "✅ 数据文件创建完成"
          echo "📊 dataset_v1.csv: $(wc -l < data/dataset_v1.csv) 行"
          ls -la data/ logs/

      - name: Run Linting
        run: |
          echo "🔍 运行代码检查..."
          export $(cat .env.test | xargs)
          if command -v ruff &> /dev/null; then
            ruff check src/ tests/ --output-format=github
          fi

      - name: Run Security Check
        run: |
          echo "🛡️ 运行安全扫描..."
          export $(cat .env.test | xargs)
          if command -v bandit &> /dev/null; then
            bandit -r src/ -f json -o bandit-report.json || true
            echo "🛡️ 安全扫描完成，报告已生成"
          fi

      - name: 🕵️ Deadlock Hunt (Global Timeout 10s)
        run: |
          echo "🕵️ 启动死锁排查模式..."
          export $(cat .env.test | xargs)
          export MALLOC_ARENA_MAX=2
          export PYTHONPATH=$PWD:$PYTHONPATH
          
          # V25.0 Enforce 10s timeout to isolate deadlock
          echo "🔥 执行全量测试 (Timeout: 10s/test)..."
          timeout 20m python -m pytest tests/ \
            -vv \
            --timeout=10 \
            --timeout-method=thread \
            --tb=short

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            test-results.xml
            bandit-report.json
          retention-days: 7

  quality-summary:
    name: 📊 Quality Summary
    runs-on: ubuntu-22.04
    needs: test
    if: always()

    steps:
      - name: Quality Summary
        run: |
          echo "📊 CI Pipeline v2 质量汇总报告"
          echo "==============================="
          TEST_STATUS="${{ needs.test.result }}"
          echo "🧪 测试矩阵: $TEST_STATUS"

          if [ "$TEST_STATUS" = "success" ]; then
            echo "✅ 所有测试通过!"
            echo "🚀 Pipeline v2 部署就绪"
          else
            echo "⚠️ 测试未通过"
            echo "🔧 请查看具体测试日志"
          fi

          echo "🎉 CI Pipeline v2 - 终极版本!"
