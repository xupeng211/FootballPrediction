---
name: Football Prediction System - Sprint 7 Full CI/CD Pipeline

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]
  schedule:
    # 每天凌晨2点运行完整测试套件
    - cron: '0 2 * * *'
    # 每周日凌晨1点运行性能基准测试
    - cron: '0 1 * * 0'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of tests to run'
        required: false
        default: 'full'
        type: choice
        options:
        - full
        - core
        - performance
        - regression
      environment:
        description: 'Target environment'
        required: false
        default: 'ci'
        type: choice
        options:
        - ci
        - staging
        - production

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"
  GO_VERSION: "1.21"

# 全局环境变量
env:
  # 应用配置
  ENVIRONMENT: ci
  DEBUG: false
  API_HOST: 0.0.0.0
  API_PORT: 8000

  # 数据库配置
  DB_HOST: localhost
  DB_PORT: 5432
  DB_NAME: football_prediction_test
  DB_USER: test_user
  DB_PASSWORD: test_password

  # Redis配置
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  REDIS_DB: 0
  REDIS_PASSWORD: ""

  # 测试配置
  MOCK_DATABASE: "false"
  MOCK_REDIS: "false"
  MOCK_EXTERNAL_APIS: "false"

  # 覆盖率配置
  COVERAGE_THRESHOLD: 80
  CORE_COVERAGE_THRESHOLD: 90

  # 性能测试配置
  ENABLE_PERFORMANCE_TESTS: "true"
  ENABLE_BENCHMARK_TESTS: "true"

jobs:
  # ================================
  # 环境准备和依赖安装
  # ================================
  setup:
    name: Environment Setup
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      python-version: ${{ steps.setup-python.outputs.python-version }}
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cache key generation
        id: cache-key
        run: |
          echo "key=$(python -c 'import hashlib; print(hashlib.sha256(f\"{PYTHON_VERSION}-{NODE_VERSION}-{GO_VERSION}\").hexdigest()[:8]')" >> $GITHUB_OUTPUT
          echo "cache-date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            postgresql-client \
            redis-tools \
            curl \
            wget \
            jq \
            build-essential \
            libpq-dev \
            redis-server

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install additional testing tools
        run: |
          # 性能测试工具
          pip install pytest-benchmark pytest-profiling pytest-xdist

          # 代码覆盖率增强工具
          pip install coverage[toml] pytest-cov pytest-html

          # 性能分析工具
          pip install memory-profiler py-spy

          # CI/CD工具
          pip install pre-commit commitizen

  # ================================
  # 代码质量检查
  # ================================
  quality-gates:
    name: Code Quality Gates
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 15

    strategy:
      matrix:
        check-type:
          - formatting
          - linting
          - type-checking
          - security
          - complexity
          - documentation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore Python cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            ${{ needs.setup.outputs.cache-key }}

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run code formatting check
        if: matrix.check-type == 'formatting'
        run: |
          echo "🎨 检查代码格式..."
          black --check --diff src/ scripts/ tests/
          isort --check-only src/ scripts/ tests/
          echo "✅ 代码格式检查通过"

      - name: Run linting
        if: matrix.check-type == 'linting'
        run: |
          echo "🔍 运行代码质量检查..."

          # Flake8 - Python代码风格
          flake8 src/ scripts/ tests/ --format=github --max-line-length=88 --extend-exclude=src/ml/models/*

          # Vulture - 死代码检测
          vulture src/ scripts/ tests/ --min-confidence 80

          # Pylint - 高级代码检查
          pylint src/ --disable=C0114,C0115,W0511 --output-format=json > pylint-report.json || true

          echo "✅ 代码质量检查完成"

      - name: Run type checking
        if: matrix.check-type == 'type-checking'
        run: |
          echo "🔬 运行类型检查..."

          # MyPy - 静态类型检查
          mypy src/ --ignore-missing-imports --strict-optional --show-error-codes --html-report mypy-report

          # 类型覆盖率分析
          mypy src/ --stats-json > type-coverage.json || true

          echo "✅ 类型检查完成"

      - name: Run security scanning
        if: matrix.check-type == 'security'
        run: |
          echo "🔒 运行安全扫描..."

          # Bandit - Python安全扫描
          bandit -r src/ -f json -o bandit-report.json

          # Safety - 依赖安全检查
          safety check --json --output safety-report.json

          # Snyk - 开源依赖漏洞扫描
          snyk test --json > snyk-report.json || true

          echo "✅ 安全扫描完成"

      - name: Run complexity analysis
        if: matrix.check-type == 'complexity'
        run: |
          echo "📊 运行复杂度分析..."

          # Radon - 代码复杂度分析
          radon cc src/ --min B --show-complexity --json > radon-report.json

          # Xenon - 监控代码质量
          xenon --max-absolute B --max-modules B --max-average A src/

          echo "✅ 复杂度分析完成"

      - name: Check documentation
        if: matrix.check-type == 'documentation'
        run: |
          echo "📚 检查文档..."

          # 检查文档字符串覆盖率
          python -m pytest --collect-only --quiet -q | grep "test session starts" > /dev/null

          # 检查API文档
          if [ -f "src/api/openapi.json" ]; then
            python -m json.tool src/api/openapi.json > /dev/null
            echo "✅ OpenAPI文档格式正确"
          fi

          echo "✅ 文档检查完成"

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-${{ matrix.check-type }}
          path: |
            pylint-report.json
            bandit-report.json
            safety-report.json
            snyk-report.json
            radon-report.json
            mypy-report/
          retention-days: 30

  # ================================
  # 数据库服务准备
  # ================================
  database-services:
    name: Database Services
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: ${{ env.DB_NAME }}
          POSTGRES_USER: ${{ env.DB_USER }}
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Wait for database services
        run: |
          echo "⏳ 等待数据库服务启动..."

          # 等待PostgreSQL
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U ${{ env.DB_USER }}; then
              echo "✅ PostgreSQL已就绪"
              break
            fi
            sleep 2
          done

          # 等待Redis
          for i in {1..30}; do
            if redis-cli -h localhost -p 6379 ping; then
              echo "✅ Redis已就绪"
              break
            fi
            sleep 1
          done

      - name: Initialize test database
        run: |
          echo "🔄 初始化测试数据库..."

          # 创建数据库
          PGPASSWORD=$DB_PASSWORD psql -h localhost -p 5432 -U $DB_USER -d postgres -c "
            CREATE DATABASE $DB_NAME;
          " || echo "数据库已存在"

          # 连接测试数据库并创建扩展
          PGPASSWORD=$DB_PASSWORD psql -h localhost -p 5432 -U $DB_USER -d $DB_NAME -c "
            CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
            CREATE EXTENSION IF NOT EXISTS \"pg_trgm\";
          "

          echo "✅ 测试数据库初始化完成"

  # ================================
  # Sprint 7 核心算法单元测试
  # ================================
  core-algorithms-tests:
    name: Core Algorithms Unit Tests (Sprint 7)
    runs-on: ubuntu-latest
    needs: [setup, database-services]
    timeout-minutes: 30

    strategy:
      matrix:
        test-category:
          - elo-rating-system
          - kelly-criterion
          - poisson-features
          - odds-movement
          - all-algorithms

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore Python cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            ${{ needs.setup.outputs.cache-key }}

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run core algorithms tests
        run: |
          echo "🧪 运行Sprint 7核心算法单元测试..."
          echo "测试类别: ${{ matrix.test-category }}"

          case "${{ matrix.test-category }}" in
            "elo-rating-system")
              pytest tests/unit/test_elo_rating_system.py -v --tb=short
              ;;
            "kelly-criterion")
              pytest tests/unit/test_kelly_criterion.py -v --tb=short
              ;;
            "poisson-features")
              pytest tests/unit/test_poisson_features.py -v --tb=short
              ;;
            "odds-movement")
              pytest tests/unit/test_odds_movement_features.py -v --tb=short
              ;;
            "all-algorithms")
              pytest tests/unit/test_elo_rating_system.py \
                         tests/unit/test_kelly_criterion.py \
                         tests/unit/test_poisson_features.py \
                         tests/unit/test_odds_movement_features.py \
                         -v --tb=short
              ;;
          esac

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-algorithms-test-results-${{ matrix.test-category }}
          path: |
            htmlcov/
            .coverage
          retention-days: 30

  # ================================
  # Sprint 7 集成测试
  # ================================
  integration-tests:
    name: Service Integration Tests (Sprint 7)
    runs-on: ubuntu-latest
    needs: [setup, database-services]
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: ${{ env.DB_NAME }}
          POSTGRES_USER: ${{ env.DB_USER }}
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore Python cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            ${{ needs.setup.outputs.cache-key }}

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run integration tests
        run: |
          echo "🔄 运行Sprint 7集成测试..."

          # 运行服务集成测试
          pytest tests/integration/test_service_integration.py \
                 -v --tb=short \
                 --cov=src \
                 --cov-report=xml:integration-coverage.xml \
                 --cov-report=html:integration-htmlcov \
                 --junitxml=integration-test-results.xml \
                 --cov-fail-under=60

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            integration-coverage.xml
            integration-htmlcov/
            integration-test-results.xml
          retention-days: 30

  # ================================
  # Sprint 7 性能基准测试
  # ================================
  performance-tests:
    name: Performance Benchmark Tests (Sprint 7)
    runs-on: ubuntu-latest
    needs: [setup, database-services]
    timeout-minutes: 60

    strategy:
      matrix:
        benchmark-type:
          - micro-benchmarks
          - load-testing
          - stress-testing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore Python cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            ${{ needs.setup.outputs.cache-key }}

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt
          python -m pip install psutil py-spy

      - name: Run performance benchmarks
        run: |
          echo "⚡ 运行Sprint 7性能基准测试..."
          echo "测试类型: ${{ matrix.benchmark-type }}"

          cd tests/performance

          case "${{ matrix.benchmark-type }}" in
            "micro-benchmarks")
              python run_benchmarks.py run \
                --benchmark-name "micro_benchmarks_sprint7" \
                --environment ci \
                --target-prediction-time 50 \
                --regression-check \
                --generate-html
              ;;
            "load-testing")
              python run_benchmarks.py run \
                --benchmark-name "load_testing_sprint7" \
                --environment ci \
                --target-prediction-time 100 \
                --generate-html
              ;;
            "stress-testing")
              python run_benchmarks.py run \
                --benchmark-name "stress_testing_sprint7" \
                --environment ci \
                --large-dataset-size 100000 \
                --max-memory-mb 4096 \
                --generate-html
              ;;
          esac

      - name: Upload performance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-reports-${{ matrix.benchmark-type }}
          path: |
            benchmark_results/
            performance_reports/
          retention-days: 30

  # ================================
  # 测试覆盖率分析
  # ================================
  coverage-analysis:
    name: Test Coverage Analysis
    runs-on: ubuntu-latest
    needs: [core-algorithms-tests, integration-tests]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Combine coverage reports
        run: |
          echo "📊 合并测试覆盖率报告..."

          # 合并所有XML覆盖率文件
          coverage combine \
            integration-coverage.xml \
            coverage-unit.xml \
            -o coverage-combined.xml

          # 生成综合HTML报告
          coverage html -d coverage-combined/

          # 生成覆盖率摘要
          coverage report --show-missing > coverage-summary.txt

      - name: Check coverage thresholds
        run: |
          echo "🎯 检查覆盖率阈值..."

          # 检查总体覆盖率
          TOTAL_COVERAGE=$(coverage report --format=json | jq '.totals']['percent_covered'])

          if [ $(echo "$TOTAL_COVERAGE > $COVERAGE_THRESHOLD" | bc -l) -eq 1 ]; then
            echo "✅ 总体覆盖率达标: $TOTAL_COVERAGE% > $COVERAGE_THRESHOLD%"
          else
            echo "❌ 总体覆盖率未达标: $TOTAL_COVERAGE% < $COVERAGE_THRESHOLD%"
            exit 1
          fi

      - name: Generate coverage badge
        run: |
          # 生成覆盖率徽章
          TOTAL_COVERAGE=$(coverage report --format=json | jq '.totals']['percent_covered'])

          cat > coverage-badge.json << EOF
          {
            "schemaVersion": 1,
            "label": "Coverage",
            "message": "${TOTAL_COVERAGE}%",
            "color": "$(if [ $TOTAL_COVERAGE -ge 80 ]; then echo "brightgreen"; elif [ $TOTAL_COVERAGE -ge 60 ]; then echo "yellow"; else echo "red"; fi)"
          }
          EOF

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage-combined.xml
            coverage-combined/
            coverage-summary.txt
            coverage-badge.json
          retention-days: 90

  # ================================
  # 回归检测
  # ================================
  regression-detection:
    name: Performance Regression Detection
    runs-on: ubuntu-latest
    needs: [performance-tests]
    if: always()
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run regression check
        run: |
          echo "🔍 检测性能回归..."

          cd tests/performance
          python run_benchmarks.py regression \
            --benchmark-name "regression_check_sprint7" \
            --environment ci

          echo "✅ 回归检测完成"

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-detection-report
          path: performance_reports/
          retention-days: 30

  # ================================
  # Docker 构建
  # ================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [quality-gates, core-algorithms-tests, integration-tests, performance-tests]
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'

    strategy:
      matrix:
        image-type:
          - base
          - production
          - development

    steps:
      - name: Checkout code
        uses: actions/visibility-actions@v4
        with:
          repository: ${{ github.repository }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/football-prediction
          tags: |
            type=ref,event=branch
            type=semver,pattern={{branch}}
            type=sha
            ${{ env.IMAGE_TAG_PREFIX }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.image-type == 'base' && 'Dockerfile' || 'Dockerfile.prod' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            IMAGE_TYPE=${{ matrix.image_type }}
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            VCS_REF=${{ github.sha }}

      - name: Generate SBOM
        run: |
          docker run --rm ${{ secrets.DOCKER_USERNAME }}/football-prediction:${{ steps.meta.outputs.tags[0] }} \
                 sbom -o sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image-type }}
          path: sbom.spdx.json
          retention-days: 90

  # ================================
  # 部署到Staging
  # ================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Deploy to staging
        run: |
          echo "🚀 部署到Staging环境..."

          # 模拟部署命令
          echo "Docker镜像: ${{ secrets.DOCKER_USERNAME }}/football-prediction:${{ steps.meta.outputs.tags[0] }}"
          echo "环境: staging"

          # 实际部署命令（取消注释以启用）
          # docker pull ${{ secrets.DOCKER_USERNAME }}/football-prediction:${{ steps.meta.outputs.tags[0] }}
          # docker-compose -f docker-compose.staging.yml up -d

          echo "✅ Staging部署完成"

  # ================================
  # 部署到Production
  # ================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release' && github.event.action == 'published'
    environment: production

    steps:
      - name: Deploy to production
        run: |
          echo "🚀 部署到生产环境..."

          echo "版本: ${{ github.event.release.tag_name }}"
          echo "Docker镜像: ${{ secrets.DOCKER_USERNAME }}/football-prediction:${{ github.event.release.tag_name }}"
          echo "环境: production"

          # 实际部署命令（取消注释以启用）
          # docker pull ${{ secrets.DOCKER_USERNAME }}/football-prediction:${{ github.event.release.tag_name }}
          # docker-compose -f docker-compose.prod.yml up -d

          # 部署后健康检查
          # sleep 30
          # curl -f http://localhost:8000/health

          echo "✅ 生产部署完成"

  # ================================
  # 成功通知
  # ================================
  success-notification:
    name: Success Notification
    runs-on: ubuntu-latest
    needs: [quality-gates, core-algorithms-tests, integration-tests, performance-tests]
    if: success()

    steps:
      - name: Send success notification
        run: |
          echo "✅ Football Prediction System CI/CD Pipeline Succeeded!"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "View: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ================================
    # 失败通知
    # ================================
  failure-notification:
    name: Failure Notification
    runs-on: ubuntu-latest
    needs: [quality-gates, core-algorithms-tests, integration-tests, performance-tests]
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "❌ Football Prediction System CI/CD Pipeline Failed!"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

# 全局权限设置
permissions:
  contents: read
  packages: write
  actions: read
  checks: write
  pull-requests: write
  issues: write
  deployments: write

# 并发控制
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true