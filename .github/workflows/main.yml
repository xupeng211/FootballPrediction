name: CI/CD Pipeline - Football Prediction System

on:
  push:
    branches: [ main, develop, feat/* ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # Step 1: 环境检查和依赖安装
  setup-and-dependencies:
    name: Setup Environment & Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          make install

      - name: Verify environment
        run: make env-check

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

  # Step 2: 代码质量检查
  code-quality:
    name: Code Quality & Static Analysis
    runs-on: ubuntu-latest
    needs: setup-and-dependencies

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: make install

      - name: Run Black code formatting
        run: make format

      - name: Check code formatting
        run: |
          git diff --exit-code --name-only
          echo "Black formatting check completed"

      - name: Run Pylint static analysis
        run: make lint

      - name: Run Mypy type checking
        run: make typecheck

      - name: Run Bandit security scan
        run: make security

      - name: Run code quality metrics
        run: make quality

  # Step 3: 单元测试和集成测试
  testing:
    name: Testing
    runs-on: ubuntu-latest
    needs: setup-and-dependencies

    strategy:
      matrix:
        test-type: [unit, integration, api]
        include:
          - test-type: unit
            test-marker: "unit"
          - test-type: integration
            test-marker: "integration"
          - test-type: api
            test-marker: "api"

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: football_prediction_test
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: make install

      - name: Verify environment
        run: make env-check

      - name: Run tests with coverage
        run: |
          . venv/bin/activate
          python -m pytest tests/ -m "${{ matrix.test-marker }}" --cov=src --cov-report=xml --cov-report=html

      - name: Upload coverage to Codecov
        if: matrix.test-type == 'unit'
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # Step 4: Docker 构建和测试
  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: [code-quality, testing]
    if: github.event_name == 'push' || github.event_name == 'release'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        run: |
          docker build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache \
            -t football-prediction:${{ github.sha }} \
            -t football-prediction:latest .

      - name: Run Docker container tests
        run: |
          docker run --rm \
            -e DB_HOST=host.docker.internal \
            -e REDIS_HOST=host.docker.internal \
            football-prediction:latest \
            python -c "import src.main; print('Docker container started successfully')"

  # Step 5: 部署 (仅在release时)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'release' && github.event.action == 'published'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/football-prediction:${{ github.event.release.tag_name }}
            ${{ secrets.DOCKER_USERNAME }}/football-prediction:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      - name: Update deployment status
        run: |
          echo "🚀 Football Prediction System v${{ github.event.release.tag_name }} deployed successfully!"
          echo "Docker Image: ${{ secrets.DOCKER_USERNAME }}/football-prediction:${{ github.event.release.tag_name }}"

  # Step 6: 通知 (仅在失败时)
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [setup-and-dependencies, code-quality, testing]
    if: failure()

    steps:
      - name: Notify on failure
        run: |
          echo "❌ CI/CD Pipeline failed!"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          exit 1