name: Python Syntax Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ast-tools

    - name: Check Python syntax
      run: |
        python -m compileall src/ -q
        if [ $? -eq 0 ]; then
          echo "✅ All Python files have valid syntax"
        else
          echo "❌ Syntax errors found"
          exit 1
        fi

    - name: Check specific modules
      run: |
        echo "Checking core module..."
        python -c "import ast, glob; [ast.parse(open(f).read()) for f in glob.glob('src/core/**/*.py', recursive=True)]"
        echo "✅ Core module OK"

        echo "Checking api module..."
        python -c "import ast, glob; [ast.parse(open(f).read()) for f in glob.glob('src/api/**/*.py', recursive=True)]"
        echo "✅ API module OK"

    - name: Generate syntax report
      run: |
        python scripts/analyze_syntax_errors.py || true
        echo "Syntax report generated in reports/"

    - name: Upload syntax report
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: syntax-error-report
        path: reports/
