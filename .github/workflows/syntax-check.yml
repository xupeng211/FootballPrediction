name: 语法检查和代码质量

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    name: Python语法检查

    steps:
    - uses: actions/checkout@v4

    - name: 设置Python环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy

    - name: 运行语法检查
      run: |
        python scripts/syntax_check.py

    - name: 运行Ruff lint
      run: |
        ruff check --no-fix src/

    - name: 运行类型检查（核心模块）
      run: |
        mypy src/core/ src/api/ src/domain/ src/services/ src/database/ --ignore-missing-imports

  test-quick:
    runs-on: ubuntu-latest
    name: 快速测试
    needs: syntax-check

    steps:
    - uses: actions/checkout@v4

    - name: 设置Python环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov

    - name: 运行快速测试
      run: |
        make test-quick
