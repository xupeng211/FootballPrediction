# Mypy 配置文件 - V106.0 极致类型检查
# ========================================
# 严格模式配置，确保类型安全

[mypy]
# === 基本配置 ===
python_version = 3.11

# === 严格模式（启用所有检查）===
strict = True
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
disallow_any_generics = True
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_equality = True

# === 错误报告 ===
show_error_codes = True
show_column_numbers = True
show_error_context = True
color_output = True
error_summary = True
pretty = True

# === 插件 ===
plugins = pydantic.mypy

# === 排除目录 ===
exclude = (?x)(
    ^build/|
    ^dist/|
    ^venv/|
    ^\.venv/|
    ^\.eggs/|
    ^legacy_research/|
    ^scripts/sql/.*\.py$
    )

# === 第三方库配置 ===
[mypy-playwright.*]
ignore_missing_imports = True

[mypy-xgboost.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-psycopg2.*]
ignore_missing_imports = True

[mypy-asyncpg.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-jwt.*]
ignore_missing_imports = True

[mypy-thefuzz.*]
ignore_missing_imports = True

[mypy-streamlit.*]
ignore_missing_imports = True

[mypy-plotly.*]
ignore_missing_imports = True

[mypy-pytest.*]
ignore_missing_imports = True

# === 测试文件放宽 ===
[mypy-tests.*]
disallow_untyped_defs = False

# === Phase2C batch1: dynamic import path (helpers on sys.path at runtime) ===
[mypy-helpers.*]
ignore_missing_imports = True

[mypy-helpers.python_db_write_guard.*]
ignore_missing_imports = True

# === Phase2C batch2: pre-existing type annotation gaps in guard-touched files ===
[mypy-src.database.schema_manager.*]
ignore_errors = True

[mypy-src.database.oddsportal_db_manager.*]
