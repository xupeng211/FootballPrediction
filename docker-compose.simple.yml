# FootballPrediction v2.3.0-shadow - 简化容器化部署

services:
  app:
    image: footballprediction-app:latest
    container_name: footballprediction-app-shadow
    ports:
      - "8001:8000"
    env_file:
      - .env.shadow
    environment:
      - ENVIRONMENT=shadow
      - SHADOW_MODE=true
      - PYTHONPATH=/app:/app/src:/app/scripts
      - DB_HOST=db
      - REDIS_HOST=redis
    volumes:
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./reports:/app/reports
    command: >
      bash -c "
      cd /app &&
      echo '🎯 启动容器化影子测试' &&
      python3 scripts/automation_daemon_24h.py --mode shadow_test --duration 24 --interval 15
      "
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - shadow-network

  db:
    image: postgres:15-alpine
    container_name: footballprediction-db-shadow
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=football_prediction_shadow
      - POSTGRES_USER=football_user
      - POSTGRES_PASSWORD=football_shadow_pass
    volumes:
      - shadow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - shadow-network

  redis:
    image: redis:7-alpine
    container_name: footballprediction-redis-shadow
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes --maxmemory 256mb
    volumes:
      - shadow_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - shadow-network

volumes:
  shadow_db_data:
  shadow_redis_data:

networks:
  shadow-network:
    driver: bridge