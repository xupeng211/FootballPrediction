# ============================================================
# V51.2 Docker Compose 补丁 - odds_scraper 服务
# ============================================================
# 此文件包含需要在 docker-compose.yml 中添加的 odds_scraper 服务配置
#
# 集成方式:
#   1. 将此服务定义复制到 docker-compose.yml 的 services 部分
#   2. 添加 volumes 中的 odds_data 声明
#   3. 使用 docker-compose --profile odds up -d 启动服务
# ============================================================

  # ============================================
  # V51.2: odds_scraper - 赔率数据采集服务
  # ============================================
  odds_scraper:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      target: runner
    image: footballprediction:v51.2-odds
    container_name: football_prediction_odds_scraper
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DOCKER_ENV=true
      - TZ=${TZ:-UTC}
      # 赔率采集配置
      - ODDS_SCRAPER_SCHEDULE=${ODDS_SCRAPER_SCHEDULE:-0 */4 * * *}
      - ODDS_SOURCE=${ODDS_SOURCE:-oddsportal}
      - BATCH_SIZE=${ODDS_BATCH_SIZE:-50}
      - REQUEST_DELAY_MIN=${ODDS_DELAY_MIN:-2}
      - REQUEST_DELAY_MAX=${ODDS_DELAY_MAX:-5}
      # 代理配置
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
      - odds_data:/app/data/odds
    command: >
      sh -c "
      echo '启动赔率采集服务...' &&
      echo '数据源: ${ODDS_SOURCE:-oddsportal}' &&
      echo '采集计划: ${ODDS_SCRAPER_SCHEDULE:-0 */4 * * *}' &&
      pip install croniter playwright &&
      python -m playwright install chromium &&
      python -c '
      import asyncio
      import time
      import logging
      from croniter import croniter
      from datetime import datetime
      from pathlib import Path

      logging.basicConfig(level=logging.INFO, format=\"%(asctime)s [%(levelname)s] %(message)s\")
      logger = logging.getLogger(__name__)

      # 导入采集模块
      import sys
      sys.path.insert(0, \"/app\")

      from src.api.collectors.odds_scraper_playwright import OddsPortalScraper

      schedule = \"${ODDS_SCRAPER_SCHEDULE:-0 */4 * * *}\"

      async def run_collection():
          \"\"\"执行一次赔率采集\"\"\"
          scraper = OddsPortalScraper(
              headless=True,
              batch_size=int(\"${ODDS_BATCH_SIZE:-50}\")
          )

          try:
              results = await scraper.collect_recent_matches()
              logger.info(f\"采集完成: {len(results)} 场比赛赔率\")
              return results
          except Exception as e:
              logger.error(f\"采集失败: {e}\")
              return []
          finally:
              await scraper.close()

      logger.info(f\"赔率采集服务已启动，计划: {schedule}\")

      # 计算下次执行时间
      cron = croniter(schedule, datetime.now())
      next_run = cron.get_next(datetime)

      while True:
          now = datetime.now()
          if now >= next_run:
              try:
                  logger.info(\"=\" * 50)
                  logger.info(\"开始执行赔率采集...\")
                  logger.info(\"=\" * 50)

                  asyncio.run(run_collection())

              except Exception as e:
                  logger.error(f\"采集异常: {e}\")
                  import traceback
                  traceback.print_exc()

              # 更新下次执行时间
              cron = croniter(schedule, datetime.now())
              next_run = cron.get_next(datetime)
              logger.info(f\"下次执行时间: {next_run.isoformat()}\")
          else:
              # 计算剩余时间并休眠
              wait_seconds = min((next_run - now).total_seconds(), 60)
              time.sleep(wait_seconds)
      '
      "
    depends_on:
      db:
        condition: service_healthy
    networks:
      - football_network
    profiles:
      - odds
      - all
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================
# 需要添加到 volumes 部分的声明
# ============================================================
# volumes:
#   ...
#   odds_data:
#     driver: local
#     name: footballprediction_odds_data

# ============================================================
# 使用说明
# ============================================================
# 1. 构建镜像
#    docker-compose build odds_scraper
#
# 2. 启动服务
#    docker-compose --profile odds up -d
#
# 3. 查看日志
#    docker-compose logs -f odds_scraper
#
# 4. 手动触发采集
#    docker-compose exec odds_scraper python -m src.api.collectors.odds_scraper_playwright
#
# 5. 停止服务
#    docker-compose --profile odds down
