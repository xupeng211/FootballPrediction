version: '3.8'

services:
  # 足球预测应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: football-prediction-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # 数据库配置
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=football_prediction

      # 连接池配置
      - DB_POOL_MIN_SIZE=5
      - DB_POOL_MAX_SIZE=20
      - DB_TIMEOUT=60.0
      - DB_HEALTH_CHECK_INTERVAL=30.0

      # 应用配置
      - APP_NAME=FootballPrediction
      - APP_VERSION=1.0.0
      - APP_ENV=development
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - APP_DEBUG=true

      # 日志配置
      - LOG_LEVEL=INFO
      - LOG_ENABLE_JSON=false

      # FotMob API配置 (请填入实际的鉴权头)
      - FOTMOB_X_MAS_HEADER=${FOTMOB_X_MAS_HEADER}
      - FOTMOB_X_FOO_HEADER=${FOTMOB_X_FOO_HEADER}
      - FOTMOB_MAX_RETRIES=3
      - FOTMOB_TIMEOUT=30
      - FOTMOB_DELAY_BETWEEN_REQUESTS=2.0

      # 时区
      - TZ=UTC

    volumes:
      # 日志卷
      - app_logs:/app/logs
      # 数据卷 (可选，用于数据持久化)
      - app_data:/app/data

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - football-network

    # 健康检查
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: football-prediction-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=football_prediction
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "5432:5432"
    volumes:
      # 数据持久化
      - postgres_data:/var/lib/postgresql/data
      # 初始化脚本
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro

    networks:
      - football-network

    # 健康检查
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis 缓存 (可选)
  redis:
    image: redis:7-alpine
    container_name: football-prediction-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

    networks:
      - football-network

    # 健康检查
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

# 数据卷
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  app_data:
    driver: local

# 网络
networks:
  football-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16