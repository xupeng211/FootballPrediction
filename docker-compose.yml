services:
  app:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    env_file:
      - .env.ci
    environment:
      # 基础配置
      - ENVIRONMENT=development
      - TZ=UTC
      - PYTHONPATH=/app/src

      # 数据库配置
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=football_prediction_dev
      - DB_USER=football_user
      - DB_PASSWORD=football_pass

      # Redis 配置
      - REDIS_URL=redis://redis:6379/0

      # v2.0 服务配置
      - INFERENCE_SERVICE_V2_ENABLED=true
      - COLLECTION_SERVICE_ENABLED=true
      - EXPLAINABILITY_SERVICE_ENABLED=true

      # 模型配置
      - MODEL_PATH=/app/data/models
      - DEFAULT_MODEL_NAME=xgboost_v2

      # API 配置
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_DEBUG=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
      - ./logs:/app/logs
      - ./data:/app/data
      - model_data:/app/data/models
      - cache_data:/app/data/cache
    networks:
      - football-network
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=football_prediction_dev
      - POSTGRES_USER=football_user
      - POSTGRES_PASSWORD=football_pass
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - football-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - football-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --appendonly yes

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - football-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  model_data:
    driver: local
  cache_data:
    driver: local

networks:
  football-network:
    driver: bridge