# FootballPrediction - 生产级数据工厂
# 50GB级真实数据引擎 - 云原生架构

services:
  # ================================
  # PostgreSQL 数据库服务
  # ================================
  db:
    image: postgres:15-alpine
    container_name: footballprediction-db
    restart: unless-stopped

    # 数据持久化到物理目录
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./logs/postgres:/var/log/postgresql
      # 数据库初始化脚本（首次启动时自动加载415场黄金数据）
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/01-seed-data.sql:ro

    # 环境变量
    environment:
      POSTGRES_DB: football_prediction
      POSTGRES_USER: football_user
      POSTGRES_PASSWORD: football_pass
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      # 性能优化
      shared_preload_libraries: pg_stat_statements
      max_connections: 200
      shared_buffers: 256MB
      effective_cache_size: 1GB

    # 端口映射
    ports:
      - "5432:5432"

    # 健康检查
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football_user -d football_prediction"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - football-net

  # ================================
  # Redis 缓存服务
  # ================================
  redis:
    image: redis:7-alpine
    container_name: footballprediction-redis
    restart: unless-stopped

    # 端口映射
    ports:
      - "6379:6379"

    # 数据持久化
    volumes:
      - ./data/redis:/data

    # Redis配置
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru

    # 健康检查
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - football-net

  # ================================
  # 数据采集引擎 (Engine)
  # ================================
  engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: footballprediction-engine
    restart: unless-stopped

    # 卷挂载 - 解决权限问题
    volumes:
      - ./:/app:ro

    # 端口映射
    ports:
      - "8000:8000"

    # 环境配置
    environment:
      # Docker环境检测
      - DOCKER_ENV=true
      - ENVIRONMENT=production

      # 数据库连接
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=football_prediction
      - DB_USER=football_user
      - DB_PASSWORD=football_pass

      # 应用配置
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - TZ=UTC

      # 采集配置
      - COLLECTION_MODE=full
      - BATCH_SIZE=100
      - RATE_LIMIT_DELAY=1.0

      # API配置
      - FOTMOB_BASE_URL=https://www.fotmob.com/api
      # API认证标头 - 需要用户提供
      - FOTMOB_X_MAS_HEADER=${FOTMOB_X_MAS_HEADER:-}
      - FOTMOB_X_FOO_HEADER=${FOTMOB_X_FOO_HEADER:-}

      # Redis配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0

      # 日志配置
      - LOG_LEVEL=INFO
      - LOG_FILE=/app/logs/engine.log

    # 依赖关系
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - football-net

    # 真实数据采集命令
    command: ["python", "src/core/main_engine_v5.py", "--mode", "full", "--limit", "700"]

  # ================================
  # 数据质量监控服务
  # ================================
  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: footballprediction-monitor
    restart: unless-stopped

    # 卷挂载
    volumes:
      - ./:/app:ro

    # 端口映射
    ports:
      - "8001:8000"

    # 环境配置
    environment:
      - DOCKER_ENV=true
      - ENVIRONMENT=monitoring
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=football_prediction
      - DB_USER=football_user
      - DB_PASSWORD=football_pass
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - TZ=UTC
      - MONITORING_MODE=true
      - HEALTH_CHECK_INTERVAL=300  # 5分钟

    # 依赖关系
    depends_on:
      db:
        condition: service_healthy

    # 健康检查
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    networks:
      - football-net

    # 数据质量监控命令 - 真实取证
    command: >
      bash -c "
      echo '🔍 Starting Football Prediction Data Quality Monitor...' &&
      while true; do
        echo '📊 $(date): 执行数据质量检查...' &&
        python /app/src/utils/data_quality_checker.py --mode production &&
        echo '💾 数据库大小: $(docker exec db psql -U football_user -d football_prediction -tAc \"SELECT pg_size_pretty(pg_database_size('football_prediction'));\" 2>/dev/null || echo \"N/A\")' &&
        echo '📈 xG记录数: $(docker exec db psql -U football_user -d football_prediction -tAc \"SELECT COUNT(*) FROM matches WHERE home_xg IS NOT NULL;\" 2>/dev/null || echo \"N/A\")' &&
        echo '⏳ 下次检查时间: $(date -d \"+5 minutes\")' &&
        echo '---' &&
        sleep 300
      done
      "

# ================================
# 网络配置
# ================================
networks:
  football-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16