# ============================================
# FootballPrediction V30.0 - Unified Docker Compose
# ============================================
# 生产级全流程自动化部署配置
# 生成时间: 2025-12-30
# 状态: V30.0 Production Ready
# ============================================
# 核心服务:
#   1. db - PostgreSQL 15 数据库 (持久化存储)
#   2. redis - Redis 7 缓存服务 (持久化存储)
#   3. pipeline_worker - V25.1 数据流水线 (按需启动)
#   4. predictor_api - FastAPI 预测服务 (按需启动)
#   5. production_cron - 自动化调度器 (每天凌晨 3:00)
#   6. db_backup - 数据库自动备份服务 (每天凌晨 2:00)
# ============================================
# 使用方式:
#   docker-compose up -d                      # 启动核心服务 (db + redis)
#   docker-compose --profile pipeline up -d   # 启动核心 + 数据流水线
#   docker-compose --profile api up -d        # 启动核心 + API 服务
#   docker-compose --profile automation up -d # 启动核心 + 自动化调度
#   docker-compose --profile dev up -d        # 启动 + 开发工具
#   docker-compose --profile all up -d        # 启动所有服务
# ============================================

services:
  # ============================================
  # db - PostgreSQL 15 数据库
  # ============================================
  db:
    image: postgres:15-alpine
    container_name: football_prediction_db
    restart: always
    env_file:
      - .env
    environment:
      # PostgreSQL 配置
      - POSTGRES_DB=${DB_NAME:-football_db}
      - POSTGRES_USER=${DB_USER:-football_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-football_pass}
      - PGDATA=/var/lib/postgresql/data/pgdata
      # 性能优化参数
      - MAX_CONNECTIONS=100
      - SHARED_BUFFERS=256MB
      - EFFECTIVE_CACHE_SIZE=1GB
      - MAINTENANCE_WORK_MEM=256MB
      - WORK_MEM=16MB
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      # 持久化存储 (命名卷)
      - postgres_data:/var/lib/postgresql/data
      # 数据库初始化脚本
      - ./deploy/docker/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-football_user} -d ${DB_NAME:-football_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - football_network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # redis - Redis 7 缓存服务
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: football_prediction_redis
    restart: always
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - football_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ============================================
  # pipeline_worker - V25.1 数据流水线
  # ============================================
  pipeline_worker:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      target: runner
    image: footballprediction:v25.1
    container_name: football_prediction_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DOCKER_ENV=true
      - TZ=${TZ:-UTC}
      # 连接池配置
      - DB_POOL_MIN=2
      - DB_POOL_MAX=20
      - DB_POOL_TIMEOUT=30
      - DB_POOL_RECYCLE=3600
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
      # V25.2: 移除本地 src 挂载以避免权限问题，使用镜像内代码
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - football_network
    profiles:
      - pipeline
      - all
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # predictor_api - FastAPI 预测服务
  # ============================================
  predictor_api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      target: runner
    image: footballprediction:v25.1
    container_name: football_prediction_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DOCKER_ENV=true
      - TZ=${TZ:-UTC}
      - API_WORKERS=${API_WORKERS:-2}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
      - ./src:/app/src:ro
    command: >
      uvicorn src.main:app
      --host 0.0.0.0
      --port 8000
      --workers ${API_WORKERS:-2}
      --loop uvloop
      --timeout-keep-alive 300
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/quick"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - football_network
    profiles:
      - api
      - all
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # dashboard - 战神仪表盘 (可选)
  # ============================================
  dashboard:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      target: runner
    image: footballprediction:v25.1
    container_name: football_prediction_dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DOCKER_ENV=true
      - TZ=${TZ:-UTC}
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
      - ./src:/app/src:ro
    command: python src/ops/wargod_dashboard.py --interval 30
    networks:
      - football_network
    profiles:
      - dashboard
      - dev
      - all
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ============================================
  # pgadmin - PostgreSQL 管理 (开发环境)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: football_prediction_pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@football.local}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
      - PGADMIN_CONFIG_SERVER_MODE=False
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - football_network
    profiles:
      - dev
      - all

  # ============================================
  # redis-commander - Redis 管理 (开发环境)
  # ============================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: football_prediction_redis_commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "${REDIS_CMD_PORT:-8081}:8081"
    networks:
      - football_network
    profiles:
      - dev
      - all

  # ============================================
  # db_backup - 数据库自动备份服务 (P0 安全加固)
  # ============================================
  db_backup:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      target: runner
    image: footballprediction:v25.1
    container_name: football_prediction_db_backup
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DOCKER_ENV=true
      - TZ=${TZ:-UTC}
      # 备份配置
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
      - BACKUP_SCHEDULE=${BACKUP_SCHEDULE:-0 2 * * *}
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
      # 备份目录需要独立卷，避免被清理
      - db_backups:/app/data/backups
    command: >
      sh -c "
      echo '启动数据库备份服务...' &&
      echo '备份计划: ${BACKUP_SCHEDULE}' &&
      echo '保留天数: ${BACKUP_RETENTION_DAYS:-30} 天' &&
      pip install croniter &&
      python -c '
      import time
      import logging
      from croniter import croniter
      from datetime import datetime
      from pathlib import Path

      logging.basicConfig(level=logging.INFO, format=\"%(asctime)s [%(levelname)s] %(message)s\")
      logger = logging.getLogger(__name__)

      # 导入备份模块
      import sys
      sys.path.insert(0, \"/app\")
      from scripts.maintenance.backup_db import DatabaseBackupManager

      manager = DatabaseBackupManager(retention_days=int(\"${BACKUP_RETENTION_DAYS:-30}\"))
      schedule = \"${BACKUP_SCHEDULE:-0 2 * * *}\"

      logger.info(f\"备份服务已启动，计划: {schedule}\")

      # 计算下次执行时间
      cron = croniter(schedule, datetime.now())
      next_run = cron.get_next(datetime)

      while True:
          now = datetime.now()
          if now >= next_run:
              try:
                  logger.info(\"开始执行定时备份...\")
                  manager.backup()
                  manager.cleanup_old_backups()
                  logger.info(\"定时备份完成\")
              except Exception as e:
                  logger.error(f\"备份失败: {e}\")
              # 更新下次执行时间
              cron = croniter(schedule, datetime.now())
              next_run = cron.get_next(datetime)
          else:
              # 计算剩余时间并休眠
              wait_seconds = min((next_run - now).total_seconds(), 60)
              time.sleep(wait_seconds)
      '
      "
    depends_on:
      db:
        condition: service_healthy
    networks:
      - football_network
    profiles:
      - backup
      - all
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ============================================
  # production_cron - 生产自动化调度器 (V30.0)
  # ============================================
  production_cron:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      target: runner
    image: footballprediction:v30.0
    container_name: football_prediction_cron
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DOCKER_ENV=true
      - TZ=${TZ:-UTC}
      # 调度配置
      - CRON_SCHEDULE=${CRON_SCHEDULE:-0 3 * * *}
      - TARGET_MATCH_COUNT=${TARGET_MATCH_COUNT:-50}
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
      - predictions:/app/predictions
    command: >
      sh -c "
      echo '启动生产自动化调度器...' &&
      echo '调度计划: ${CRON_SCHEDULE:-0 3 * * *}' &&
      echo '目标采集: ${TARGET_MATCH_COUNT:-50} 场' &&
      pip install croniter &&
      python -c '
      import time
      import logging
      import asyncio
      from croniter import croniter
      from datetime import datetime
      from pathlib import Path

      logging.basicConfig(level=logging.INFO, format=\"%(asctime)s [%(levelname)s] %(message)s\")
      logger = logging.getLogger(__name__)

      # 导入调度模块
      import sys
      sys.path.insert(0, \"/app\")
      from scripts.automate_production import ProductionScheduler

      schedule = \"${CRON_SCHEDULE:-0 3 * * *}\"

      logger.info(f\"自动化调度器已启动，计划: {schedule}\")

      # 计算下次执行时间
      cron = croniter(schedule, datetime.now())
      next_run = cron.get_next(datetime)

      while True:
          now = datetime.now()
          if now >= next_run:
              try:
                  logger.info(\"=\" * 60)
                  logger.info(\"开始执行生产流程...\")
                  logger.info(\"=\" * 60)

                  scheduler = ProductionScheduler(
                      enable_prediction=True,
                      target_match_count=int(\"${TARGET_MATCH_COUNT:-50}\")
                  )

                  summary = asyncio.run(scheduler.run())

                  if summary.result.value == \"success\":
                      logger.info(\"✓ 生产流程执行成功\")
                  else:
                      logger.warning(f\"⚠ 生产流程执行结果: {summary.result.value}\")

              except Exception as e:
                  logger.error(f\"生产流程异常: {e}\")
                  import traceback
                  traceback.print_exc()

              # 更新下次执行时间
              cron = croniter(schedule, datetime.now())
              next_run = cron.get_next(datetime)
              logger.info(f\"下次执行时间: {next_run.isoformat()}\")
          else:
              # 计算剩余时间并休眠
              wait_seconds = min((next_run - now).total_seconds(), 60)
              time.sleep(wait_seconds)
      '
      "
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - football_network
    profiles:
      - automation
      - all
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================
# 数据卷 - 持久化存储
# ============================================
volumes:
  postgres_data:
    driver: local
    name: footballprediction_postgres_data
  redis_data:
    driver: local
    name: footballprediction_redis_data
  pgadmin_data:
    driver: local
    name: footballprediction_pgadmin_data
  app_data:
    driver: local
    name: footballprediction_app_data
  app_logs:
    driver: local
    name: footballprediction_app_logs
  db_backups:
    driver: local
    name: footballprediction_db_backups
  predictions:
    driver: local
    name: footballprediction_predictions

# ============================================
# 网络
# ============================================
networks:
  football_network:
    driver: bridge
    name: football_prediction_network
    ipam:
      config:
        - subnet: 172.20.0.0/16
