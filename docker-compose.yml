# ============================================
# FootballPrediction V29.0 - Unified Docker Compose
# ============================================
# 归一化部署编排 - 单一工业级入口
# 生成时间: 2025-12-25
# 状态: V29.0 Cloud-Native Ready
# ============================================
# 使用方式:
#   docker-compose up -d                    # 启动核心服务
#   docker-compose --profile api up -d     # 启动 + API
#   docker-compose --profile dev up -d     # 启动 + 开发工具
#   docker-compose --profile all up -d     # 启动所有服务
# ============================================

services:
  # ============================================
  # prediction_worker - V29.0 核心预测引擎
  # ============================================
  prediction_worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      target: production
    image: footballprediction:v29.0
    container_name: football_prediction_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DOCKER_ENV=true
      - PIPELINE_MODE=${PIPELINE_MODE:-loop}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./src:/app/src:ro
    command: python src/ops/data_pipeline_v25.py --mode ${PIPELINE_MODE:-loop}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - football_network

  # ============================================
  # api - FastAPI 服务 (profile: api)
  # ============================================
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      target: production
    image: footballprediction:v29.0
    container_name: football_prediction_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DOCKER_ENV=true
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./src:/app/src:ro
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/quick"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - football_network
    profiles:
      - api

  # ============================================
  # harvester - V20.8 数据回填 (profile: harvester)
  # ============================================
  harvester:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      target: production
    image: footballprediction:v29.0
    container_name: football_prediction_harvester
    restart: on-failure
    env_file:
      - .env
    environment:
      - DOCKER_ENV=true
      - HARVEST_MODE=scorched_earth
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./src:/app/src:ro
    command: python src/ops/backfill_v20.8_scorched_earth.py
    depends_on:
      db:
        condition: service_healthy
    networks:
      - football_network
    profiles:
      - harvester

  # ============================================
  # dashboard - 战神仪表盘 (profile: dashboard)
  # ============================================
  dashboard:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      target: production
    image: footballprediction:v29.0
    container_name: football_prediction_dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DOCKER_ENV=true
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./src:/app/src:ro
    command: python src/ops/wargod_dashboard.py --interval 30
    networks:
      - football_network
    profiles:
      - dashboard
      - dev

  # ============================================
  # db - PostgreSQL 15
  # ============================================
  db:
    image: postgres:15-alpine
    container_name: football_prediction_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_NAME:-football_db}
      - POSTGRES_USER=${DB_USER:-football_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-football_pass}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-football_user} -d ${DB_NAME:-football_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - football_network

  # ============================================
  # redis - Redis 7
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: football_prediction_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - football_network

  # ============================================
  # pgadmin - PostgreSQL 管理 (profile: dev)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: football_prediction_pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@football.local
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - football_network
    profiles:
      - dev
      - all

  # ============================================
  # redis-commander - Redis 管理 (profile: dev)
  # ============================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: football_prediction_redis_commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "${REDIS_CMD_PORT:-8081}:8081"
    networks:
      - football_network
    profiles:
      - dev
      - all

# ============================================
# 数据卷
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

# ============================================
# 网络
# ============================================
networks:
  football_network:
    driver: bridge
