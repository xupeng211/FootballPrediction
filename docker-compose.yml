services:
  # ============================================
  # FastAPI 应用服务
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: football_prediction_app
    ports:
      - "8000:8000"  # FastAPI 服务端口
    environment:
      # 数据库配置
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=football_db
      - DB_USER=football_user
      - DB_PASSWORD=football_pass
      # Redis 配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      # Docker 环境标识
      - DOCKER_ENV=true
      # 应用配置
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - TZ=UTC
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      # V19.4 新增挂载 - 持久化 ops 运维模块
      - ./src/ops:/app/src/ops
      # V19.4 新增挂载 - 持久化生产模型文件
      - ./src/production_models:/app/src/production_models
      # V19.4 新增挂载 - 统一生产入口
      - ./main_production.py:/app/main_production.py
    command: >
      uvicorn src.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --loop uvloop
      --timeout-keep-alive 300
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/quick"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - football_network

  # ============================================
  # PostgreSQL 数据库服务
  # ============================================
  db:
    image: postgres:15-alpine
    container_name: football_prediction_db
    environment:
      - POSTGRES_DB=football_db
      - POSTGRES_USER=football_user
      - POSTGRES_PASSWORD=football_pass
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football_user -d football_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - football_network

  # ============================================
  # Redis 缓存服务
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: football_prediction_redis
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - football_network

# ============================================
# 数据卷
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================
# 网络
# ============================================
networks:
  football_network:
    driver: bridge