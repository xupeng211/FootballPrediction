services:
  app:
    build: .
    container_name: football_prediction_app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=football_db
      - DB_USER=football_user
      - DB_PASSWORD=football_pass
      - REDIS_HOST=redis
      - DOCKER_ENV=true
    volumes:
      - .:/app
    depends_on:
      - db
    command: tail -f /dev/null  # Keep running for manual exec commands

  db:
    image: postgres:15-alpine
    container_name: football_prediction_db
    environment:
      - POSTGRES_DB=football_db
      - POSTGRES_USER=football_user
      - POSTGRES_PASSWORD=football_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: football_prediction_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: