# ============================================
# FootballPrediction V25.1 - Unified Docker Compose
# ============================================
# 万能自适应特征提取引擎 - 工业级部署配置
# 生成时间: 2025-12-26
# 状态: V25.1 Production Ready
# ============================================
# 核心服务:
#   1. db - PostgreSQL 15 数据库 (持久化存储)
#   2. redis - Redis 7 缓存服务 (持久化存储)
#   3. pipeline_worker - V25.1 数据流水线 (按需启动)
#   4. predictor_api - FastAPI 预测服务 (按需启动)
# ============================================
# 使用方式:
#   docker-compose up -d                    # 启动核心服务 (db + redis)
#   docker-compose --profile pipeline up -d  # 启动核心 + 数据流水线
#   docker-compose --profile api up -d       # 启动核心 + API 服务
#   docker-compose --profile dev up -d       # 启动 + 开发工具
#   docker-compose --profile all up -d       # 启动所有服务
# ============================================

services:
  # ============================================
  # db - PostgreSQL 15 数据库
  # ============================================
  db:
    image: postgres:15-alpine
    container_name: football_prediction_db
    restart: always
    env_file:
      - .env
    environment:
      # PostgreSQL 配置
      - POSTGRES_DB=${DB_NAME:-football_db}
      - POSTGRES_USER=${DB_USER:-football_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-football_pass}
      - PGDATA=/var/lib/postgresql/data/pgdata
      # 性能优化参数
      - MAX_CONNECTIONS=100
      - SHARED_BUFFERS=256MB
      - EFFECTIVE_CACHE_SIZE=1GB
      - MAINTENANCE_WORK_MEM=256MB
      - WORK_MEM=16MB
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      # 持久化存储 (命名卷)
      - postgres_data:/var/lib/postgresql/data
      # 数据库初始化脚本
      - ./deploy/docker/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-football_user} -d ${DB_NAME:-football_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - football_network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # redis - Redis 7 缓存服务
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: football_prediction_redis
    restart: always
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - football_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ============================================
  # pipeline_worker - V25.1 数据流水线
  # ============================================
  pipeline_worker:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      target: runner
    image: footballprediction:v25.1
    container_name: football_prediction_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DOCKER_ENV=true
      - TZ=${TZ:-UTC}
      # 连接池配置
      - DB_POOL_MIN=2
      - DB_POOL_MAX=20
      - DB_POOL_TIMEOUT=30
      - DB_POOL_RECYCLE=3600
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
      # V25.2: 移除本地 src 挂载以避免权限问题，使用镜像内代码
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - football_network
    profiles:
      - pipeline
      - all
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # predictor_api - FastAPI 预测服务
  # ============================================
  predictor_api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      target: runner
    image: footballprediction:v25.1
    container_name: football_prediction_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DOCKER_ENV=true
      - TZ=${TZ:-UTC}
      - API_WORKERS=${API_WORKERS:-2}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
      - ./src:/app/src:ro
    command: >
      uvicorn src.main:app
      --host 0.0.0.0
      --port 8000
      --workers ${API_WORKERS:-2}
      --loop uvloop
      --timeout-keep-alive 300
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/quick"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - football_network
    profiles:
      - api
      - all
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # dashboard - 战神仪表盘 (可选)
  # ============================================
  dashboard:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      target: runner
    image: footballprediction:v25.1
    container_name: football_prediction_dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DOCKER_ENV=true
      - TZ=${TZ:-UTC}
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
      - ./src:/app/src:ro
    command: python src/ops/wargod_dashboard.py --interval 30
    networks:
      - football_network
    profiles:
      - dashboard
      - dev
      - all
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ============================================
  # pgadmin - PostgreSQL 管理 (开发环境)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: football_prediction_pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@football.local}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
      - PGADMIN_CONFIG_SERVER_MODE=False
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - football_network
    profiles:
      - dev
      - all

  # ============================================
  # redis-commander - Redis 管理 (开发环境)
  # ============================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: football_prediction_redis_commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "${REDIS_CMD_PORT:-8081}:8081"
    networks:
      - football_network
    profiles:
      - dev
      - all

# ============================================
# 数据卷 - 持久化存储
# ============================================
volumes:
  postgres_data:
    driver: local
    name: footballprediction_postgres_data
  redis_data:
    driver: local
    name: footballprediction_redis_data
  pgadmin_data:
    driver: local
    name: footballprediction_pgadmin_data
  app_data:
    driver: local
    name: footballprediction_app_data
  app_logs:
    driver: local
    name: footballprediction_app_logs

# ============================================
# 网络
# ============================================
networks:
  football_network:
    driver: bridge
    name: football_prediction_network
    ipam:
      config:
        - subnet: 172.20.0.0/16
