repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements

  - repo: local
    hooks:
      - id: python-syntax-check
        name: Python syntax check
        entry: python -m py_compile
        language: system
        files: \.py$

      - id: check-python-imports
        name: Check Python imports
        entry: python -c "import ast; [ast.parse(open(f).read()) for f in __import__('sys').argv[1:]]"
        language: system
        files: ^src/(core|api|utils)/

      - id: python-compile-check
        name: Python compile check
        entry: python -c "import py_compile, sys; [py_compile.compile(f, doraise=True) for f in sys.argv[1:]]"
        language: system
        files: \.py$

      - id: flake8
        name: Flake8 linting
        entry: flake8
        language: system
        types: [python]
        args: [--max-line-length=88, --ignore=E203,W503,E501]

      - id: mypy
        name: MyPy type checking
        entry: mypy
        language: system
        types: [python]
        args: [--ignore-missing-imports, --no-strict-optional]
        files: ^src/(core|api|utils)/
