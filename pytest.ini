[tool:pytest]
# pytest配置文件

# 测试发现
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 输出配置
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10
    --ignore=tests/Z_LEGACY_ARCHIVE_PRE_V4.46.8

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    integrity: 数据完整性和边缘情况测试
    slow: 慢速测试
    network: 需要网络的测试
    e2e: 端到端测试
    performance: 性能测试

# 最小版本要求
minversion = 6.0

# 测试路径
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg
    venv
    env
    __pycache__
    .pytest_cache
    Z_LEGACY_ARCHIVE_PRE_V4.46.8

# 异步测试配置
asyncio_mode = auto

# 覆盖率配置
# 注意：如果使用pytest-cov，可以在命令行中添加 --cov=src --cov-report=html
