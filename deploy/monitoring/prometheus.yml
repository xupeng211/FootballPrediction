# Prometheus Configuration for Football Prediction v2.0
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'football-prediction'
    environment: 'development'

rule_files:
  - "alerts.yml"

# Alertmanager configuration (for production use)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

scrape_configs:
  # ================================
  # Prometheus Self-Scraping
  # ================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s
    metrics_path: /metrics

  # ================================
  # FastAPI Application
  # ================================
  - job_name: 'football-prediction-api'
    static_configs:
      - targets: ['app:8000']
    scrape_interval: 15s
    metrics_path: /metrics
    scrape_timeout: 10s
    params:
      format: ['prometheus']

  # ================================
  # Node Exporter (System Metrics)
  # ================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

  # ================================
  # Redis Exporter
  # ================================
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s

  # ================================
  # Celery Exporter (via Telegraf)
  # ================================
  - job_name: 'celery-exporter'
    static_configs:
      - targets: ['celery-exporter:9200']
    scrape_interval: 15s
    metrics_path: /metrics

  # ================================
  # PostgreSQL Exporter (if needed)
  # ================================
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s
    scrape_timeout: 10s

  # ================================
  # Blackbox Exporter (Health Checks)
  # ================================
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://app:8000/health
        - http://app:8000/docs
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

# ================================
# Recording Rules
# ================================
recording_rules:
  - name: football-prediction.rules
    interval: 30s
    rules:
      # API Performance Rules
      - record: api:request_rate_5m
        expr: rate(flask_http_request_total[5m])

      - record: api:error_rate_5m
        expr: rate(flask_http_request_exceptions_total[5m]) / rate(flask_http_request_total[5m]) * 100

      - record: api:p95_latency_5m
        expr: histogram_quantile(0.95, rate(flask_http_request_duration_seconds_bucket[5m]))

      # Business Metrics Rules
      - record: business:prediction_rate_5m
        expr: rate(prediction_requests_total[5m])

      - record: business:model_latency_p95_5m
        expr: histogram_quantile(0.95, rate(model_inference_latency_seconds_bucket[5m]))

      # System Metrics Rules
      - record: system:cpu_usage_percent
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)

      - record: system:memory_usage_percent
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100

      - record: system:disk_usage_percent
        expr: (node_filesystem_size_bytes - node_filesystem_avail_bytes) / node_filesystem_size_bytes * 100

